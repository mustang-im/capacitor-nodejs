plugins {
    id 'com.android.library'
}

ext {
    junitVersion = project.hasProperty('junitVersion') ? rootProject.ext.junitVersion : '4.13.2'
    androidxAppCompatVersion = project.hasProperty('androidxAppCompatVersion') ? rootProject.ext.androidxAppCompatVersion : '1.7.0'
    androidxJunitVersion = project.hasProperty('androidxJunitVersion') ? rootProject.ext.androidxJunitVersion : '1.2.1'
    androidxEspressoCoreVersion = project.hasProperty('androidxEspressoCoreVersion') ? rootProject.ext.androidxEspressoCoreVersion : '3.6.1'
}

android {
    namespace "net.hampoelz.capacitor.nodejs"
    compileSdk project.hasProperty('compileSdkVersion') ? rootProject.ext.compileSdkVersion : 35
    defaultConfig {
        minSdkVersion project.hasProperty('minSdkVersion') ? rootProject.ext.minSdkVersion : 23
        targetSdkVersion project.hasProperty('targetSdkVersion') ? rootProject.ext.targetSdkVersion : 35
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        externalNativeBuild {
            cmake {
                cppFlags ""
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    lint {
        abortOnError false
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    externalNativeBuild {
        cmake {
            path file('CMakeLists.txt')
        }
    }
    packaging {
        pickFirst 'lib/x86/libnode.so'
        pickFirst 'lib/armeabi-v7a/libnode.so'
        pickFirst 'lib/arm64-v8a/libnode.so'
        pickFirst 'lib/x86_64/libnode.so'
    }
}

repositories {
    google()
    mavenCentral()
}


dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation project(':capacitor-android')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

import org.gradle.internal.os.OperatingSystem
import org.gradle.util.GradleVersion

// Execute configuration during the configuration phase (not as a task)
// This code runs when the build.gradle is evaluated
{
    // Capture rootProject values during configuration phase for configuration cache compatibility
    def rootBuildDir = rootProject.buildDir
    def rootProjectDir = rootProject.projectDir
    def pluginProjectDir = project.projectDir

    if (android.defaultConfig.ndk.abiFilters == null || android.defaultConfig.ndk.abiFilters.isEmpty()) {
        // No abiFilter is defined for the build. Set it to the supported architectures.
        logger.warn("capacitor-nodejs detected no ABI filters were set. Will use [\"armeabi-v7a\", \"x86\", \"arm64-v8a\", \"x86_64\"].")
        android.defaultConfig.ndk.abiFilters = ["armeabi-v7a", "x86", "arm64-v8a", "x86_64"] as Set<String>
    }

    // Configure androidResources to exclude certain files from the APK
    android.androidResources {
        ignoreAssetsPattern '*.gz:build-native-modules-MacOS-helper-script.sh:NODEJS_MOBILE_BUILD_NATIVE_MODULES_VALUE.txt'
    }

    if (GradleVersion.current() < GradleVersion.version("4.0")) {
        android.sourceSets.main.jniLibs.srcDirs += 'libs/cdvnodejsmobile/libnode/bin/'
    }

    // Get Capacitor config to determine webDir and nodeDir
    String projectWWW // www/assets folder from the Application project (Capacitor uses 'public')
    String nodeDir = "nodejs" // Default nodeDir from CapacitorNodeJS plugin config
    String webDir = "www" // Default webDir

    // Try to read capacitor.config.json
    def capacitorConfigFile = file("${rootProjectDir}/capacitor.config.json")
    def capacitorConfig = null
    if (capacitorConfigFile.exists() && capacitorConfigFile.name.endsWith('.json')) {
        capacitorConfig = new groovy.json.JsonSlurper().parse(capacitorConfigFile)
        webDir = capacitorConfig.webDir ?: "www"
        def pluginConfig = capacitorConfig.plugins?.CapacitorNodeJS
        if (pluginConfig?.nodeDir) {
            nodeDir = pluginConfig.nodeDir
        }
    }

    // For Capacitor, webDir is relative to project root, and gets copied to android/app/src/main/assets/public
    // Use rootProject.projectDir to get the app's android directory, not the plugin's directory (important when using yarn link)
    projectWWW = "${rootProject.projectDir}/app/src/main/assets/public"

    // Verify the www folder exists
    if (!file(projectWWW).exists()) {
        throw new GradleException('capacitor-nodejs couldn\'t find the www/public folder in the Android project. Expected at: ' + projectWWW)
    }

    String shouldRebuildNativeModules = System.getenv('NODEJS_MOBILE_BUILD_NATIVE_MODULES')

    if (shouldRebuildNativeModules == null) {
        // If the environment variable is not set right now, check if it has been saved to a file during
        // the Capacitor sync/prepare phase.
        def nativeModulesPreferenceFile = file("${projectWWW}/NODEJS_MOBILE_BUILD_NATIVE_MODULES_VALUE.txt")
        if (nativeModulesPreferenceFile.exists()) {
            shouldRebuildNativeModules = nativeModulesPreferenceFile.text.trim()
        }
    }

    if (shouldRebuildNativeModules == null) {
        // If build native modules preference is not set, try to find .gyp files to turn it on.
        shouldRebuildNativeModules = "0"
        def nodeDirPath = file("${projectWWW}/${nodeDir}/")
        if (nodeDirPath.exists()) {
            def gypFilesTree = fileTree(dir: nodeDirPath, include: "**/*.gyp")
            gypFilesTree.visit { gypFile ->
                if (!gypFile.isDirectory()) {
                    // It's a .gyp file.
                    shouldRebuildNativeModules = "1"
                    gypFile.stopVisiting()
                }
            }
        }
    }

    if (shouldRebuildNativeModules == "1") {

        // Determine npm command name - use helper script on macOS if npm might not be in PATH
        // (e.g., when Gradle is run from Android Studio). The helper script is created by
        // the Capacitor prepare hook with the PATH that was available during sync/prepare.
        String npmCommandName = 'npm'
        if (OperatingSystem.current().isMacOsX()) {
            // Check if helper script exists - if it does, prefer it since it has the correct PATH
            def helperScript = file("${projectWWW}/build-native-modules-MacOS-helper-script.sh")
            if (helperScript.exists()) {
                npmCommandName = '../build-native-modules-MacOS-helper-script.sh'
            } else {
                // If no helper script, try to find npm in PATH using a simple check
                // (avoiding exec during configuration phase which can fail)
                def npmPath = System.getenv('PATH')?.split(File.pathSeparator)?.find { path ->
                    new File(path, 'npm').exists() || new File(path, 'npm.cmd').exists()
                }
                if (npmPath == null) {
                    logger.warn("Couldn't find npm in the PATH for building native modules. Will try to use 'npm' directly.")
                }
            }
        }

        android.defaultConfig.ndk.abiFilters.each { abiName ->
            def tempArch = switch (abiName) {
                case 'armeabi-v7a' -> 'arm'
                case 'arm64-v8a' -> 'arm64'
                default -> abiName
            }

            def tempCcVer = '4.9'
            def (tempDestCpu, tempV8Arch, tempSuffix, tempToolchainName) = switch (tempArch) {
                case 'arm' -> ['arm', 'arm', 'arm-linux-androideabi', 'arm-linux-androideabi']
                case 'x86' -> ['ia32', 'ia32', 'i686-linux-android', 'x86']
                case 'x86_64' -> ['x64', 'x64', 'x86_64-linux-android', 'x86_64']
                case 'arm64' -> ['arm64', 'arm64', 'aarch64-linux-android', 'aarch64']
                default -> throw new GradleException("Unsupported architecture for nodejs-mobile native modules: ${tempArch}")
            }

            def ndkBundlePath = android.ndkDirectory
            def makeToolchainScript = "${ndkBundlePath}/build/tools/make-standalone-toolchain.sh"
            def useNdkToolchain = !file(makeToolchainScript).exists() // NDK 27+ doesn't have make-standalone-toolchain.sh

            def standaloneToolchain
            def npmToolchainAr
            def npmToolchainCc
            def npmToolchainCxx
            def npmToolchainLink

            if (useNdkToolchain) {
                // For NDK 27+, use the NDK's built-in toolchain directly
                def hostOs = OperatingSystem.current().isMacOsX() ? 'darwin-x86_64' : (OperatingSystem.current().isLinux() ? 'linux-x86_64' : 'windows-x86_64')
                def ndkToolchainBase = "${ndkBundlePath}/toolchains/llvm/prebuilt/${hostOs}"
                def apiLevel = '21' // Minimum API level for nodejs-mobile
                standaloneToolchain = ndkToolchainBase // For compatibility with TOOLCHAIN env var
                npmToolchainAr = "${ndkToolchainBase}/bin/llvm-ar"
                // NDK 27+ uses unified toolchain with architecture prefix
                def clangArch = switch (tempArch) {
                    case 'arm' -> 'armv7a'
                    case 'arm64' -> 'aarch64'
                    case 'x86' -> 'i686'
                    case 'x86_64' -> 'x86_64'
                    default -> tempArch
                }
                npmToolchainCc = "${ndkToolchainBase}/bin/${clangArch}-linux-android${apiLevel}-clang"
                npmToolchainCxx = "${ndkToolchainBase}/bin/${clangArch}-linux-android${apiLevel}-clang++"
                npmToolchainLink = npmToolchainCxx
            } else {
                // For older NDK versions, use standalone toolchain
                standaloneToolchain = "${rootBuildDir}/standalone-toolchains/${tempToolchainName}"
                npmToolchainAr = "${standaloneToolchain}/bin/${tempSuffix}-ar"
                npmToolchainCc = "${standaloneToolchain}/bin/${tempSuffix}-clang"
                npmToolchainCxx = "${standaloneToolchain}/bin/${tempSuffix}-clang++"
                npmToolchainLink = npmToolchainCxx
            }

            // hostOs for GYP defines (different from NDK host OS)
            def hostOsGyp = OperatingSystem.current().isMacOsX() ? 'mac' : (OperatingSystem.current().isLinux() ? 'linux' : 'windows')
            def npmGypDefines = "target_arch=${tempArch} v8_target_arch=${tempV8Arch} android_target_arch=${tempArch} host_os=${hostOsGyp} OS=android"

            tasks.register("CopyNodeProjectAssets${abiName}") {
                description = "Copying node assets to build native modules for ${abiName}."
                def nodeDirPath = file("${projectWWW}/${nodeDir}/")
                def buildDirPath = "${rootBuildDir}/nodejs-native-assets-temp-build/nodejs-native-assets-${abiName}/"
                inputs.files fileTree(dir: nodeDirPath).exclude { details ->
                    // We shouldn't need to rebuild native code if there are only changes in the Node.js project javascript files.
                    !details.isDirectory() &&
                    details.path.endsWith('.js') &&
                    !details.path.startsWith('node_modules/')
                }
                outputs.file("${buildDirPath}/copy.timestamp")

                doLast {
                    def buildDir = new File(buildDirPath)
                    if (buildDir.exists()) {
                        buildDir.deleteDir()
                    }

                    project.copy {
                        from nodeDirPath
                        into new File(buildDir, nodeDir)
                        // Symlinks to binaries are resolved by Capacitor sync and Gradle during the copy, causing build time errors.
                        // The original project's .bin folder will be added to the path while building in the BuildNpmModules tasks.
                        exclude "**/.bin"
                    }

                    if (OperatingSystem.current().isMacOsX()) {
                        // Copy the helper script for calling npm when building in Android Studio on macOS.
                        def helperScript = new File(projectWWW, "build-native-modules-MacOS-helper-script.sh")
                        if (helperScript.exists()) {
                            project.copy {
                                from helperScript
                                into buildDir
                            }
                        }
                    }

                    new File(buildDir, "copy.timestamp").text = new Date().format('yyyy-MM-dd HH:mm:ss')
                }
            }

            tasks.register("MakeToolchain${abiName}", Exec) {
                description = "Building a native toolchain to compile nodejs-mobile native modules for ${abiName}."

                if (useNdkToolchain) {
                    // For NDK 27+, toolchain is already available, no need to create it
                    executable = 'true' // No-op command
                    args = []
                    outputs.upToDateWhen { true }
                } else {
                    // For older NDK versions, create standalone toolchain
                    executable = makeToolchainScript
                    args "--toolchain=${tempToolchainName}-${tempCcVer}", "--arch=${tempArch}", "--install-dir=${standaloneToolchain}", "--stl=libc++", "--force", "--platform=android-22"
                    outputs.file standaloneToolchain
                }
            }

            tasks.register("BuildNpmModules${abiName}", Exec) {
                dependsOn "MakeToolchain${abiName}"
                dependsOn "CopyNodeProjectAssets${abiName}"
                description = "Building native modules for ${abiName}."

                def buildDir = "${rootBuildDir}/nodejs-native-assets-temp-build/nodejs-native-assets-${abiName}"
                inputs.file("${buildDir}/copy.timestamp")
                outputs.dir("${buildDir}/${nodeDir}/")

                workingDir "${buildDir}/${nodeDir}/"

                // Look for nodejs-mobile-gyp in the directory where Capacitor CLI is called from
                // rootProjectDir is mobile/android, so ../ goes to mobile/ (where Capacitor CLI is called from)
                def npmGypPath = "${rootProjectDir}/../node_modules/nodejs-mobile-gyp/bin/node-gyp.js"
                def npmGypPathFile = file(npmGypPath)

                if (!npmGypPathFile.exists()) {
                    throw new GradleException("Could not find nodejs-mobile-gyp. Expected at: ${npmGypPathFile.absolutePath}")
                }

                // Ensure nodejs-mobile-gyp is used instead of regular node-gyp
                doFirst {
                    def buildNodeModules = new File("${buildDir}/${nodeDir}/node_modules")
                    if (buildNodeModules.exists()) {
                        // Create symlink to nodejs-mobile-gyp in node_modules/.bin so npm uses it
                        def binDir = new File(buildNodeModules, ".bin")
                        if (!binDir.exists()) {
                            binDir.mkdirs()
                        }
                        def nodeGypLink = new File(binDir, "node-gyp")
                        def nodeGypJsLink = new File(binDir, "node-gyp.js")
                        def absoluteGypPath = new File(npmGypPath).absolutePath

                        // Remove existing links if they exist
                        if (nodeGypLink.exists()) nodeGypLink.delete()
                        if (nodeGypJsLink.exists()) nodeGypJsLink.delete()

                        // Create symlinks to nodejs-mobile-gyp
                        java.nio.file.Files.createSymbolicLink(
                            nodeGypLink.toPath(),
                            new File(absoluteGypPath).toPath()
                        )
                        java.nio.file.Files.createSymbolicLink(
                            nodeGypJsLink.toPath(),
                            new File(absoluteGypPath).toPath()
                        )
                        logger.info("Created symlinks to nodejs-mobile-gyp at ${absoluteGypPath}")
                    }
                }

                commandLine npmCommandName, '--verbose', 'rebuild', '--build-from-source'

                environment 'npm_config_node_engine', 'v8'
                // Use libnode directory - it's in android/libnode
                environment 'npm_config_nodedir', "${pluginProjectDir}/libnode"
                environment 'npm_config_node_gyp', npmGypPath
                environment 'npm_config_arch', tempArch
                environment 'npm_config_platform', 'android'
                environment 'npm_config_format', 'make-android'

                // Adds the CLI directory's .bin to the path. All build tools should be in node_modules/.bin
                def cliBin = file("${rootProjectDir}/../node_modules/.bin")
                if (cliBin.exists()) {
                    def pathSeparator = System.getProperty("path.separator")
                    environment 'PATH', "${cliBin.absolutePath}${pathSeparator}${System.env.PATH}"
                    logger.info("capacitor-nodejs: Added to PATH: ${cliBin.absolutePath}")
                }

                environment 'TOOLCHAIN', standaloneToolchain
                environment 'AR', npmToolchainAr
                environment 'CC', npmToolchainCc
                environment 'CXX', npmToolchainCxx
                environment 'LINK', npmToolchainLink
                environment 'GYP_DEFINES', npmGypDefines
            }

            tasks.register("CopyBuiltNpmAssets${abiName}", Sync) {
                dependsOn "BuildNpmModules${abiName}"
                description = "Copying node assets with build native modules for ${abiName}."
                from "${rootBuildDir}/nodejs-native-assets-temp-build/nodejs-native-assets-${abiName}/${nodeDir}/"
                into "${rootBuildDir}/nodejs-native-assets/nodejs-native-assets-${abiName}/"
                includeEmptyDirs = false
                include '**/*.node'
            }

            tasks.register("GenerateNodeNativeAssetsLists${abiName}") {
                dependsOn "CopyBuiltNpmAssets${abiName}"
                description = "Generates a list for runtime copying"

                def assetsDir = file("${rootBuildDir}/nodejs-native-assets/nodejs-native-assets-${abiName}/")
                inputs.dir assetsDir
                outputs.file "${assetsDir}/file.list"
                outputs.file "${assetsDir}/dir.list"

                doLast {
                    if (!assetsDir.exists()) {
                        // If the native assets folder doesn't exist from the copy task, skip the creation of the file.list
                        return
                    }

                    def fileListPath = file("${assetsDir}/file.list")
                    def dirListPath = file("${assetsDir}/dir.list")
                    delete fileListPath, dirListPath

                    def fileList = new StringBuilder()
                    def dirList = new StringBuilder()

                    fileTree(dir: assetsDir).visit { assetFile ->
                        if (assetFile.isDirectory()) {
                            dirList.append("${assetFile.relativePath}\n")
                        } else {
                            fileList.append("${assetFile.relativePath}\n")
                        }
                    }

                    fileListPath.text = fileList.toString()
                    dirListPath.text = dirList.toString()
                }
            }

            tasks.named('preBuild').configure {
                dependsOn "GenerateNodeNativeAssetsLists${abiName}"
            }

            // Copy Android-built .node files to the app's assets to replace non-Android versions (macOS, Linux, Windows)
            // This works on both macOS and Linux build systems
            tasks.register("CopyAndroidNodeFilesToAppAssets${abiName}", Copy) {
                dependsOn "CopyBuiltNpmAssets${abiName}"
                description = "Copy Android-built .node files for ${abiName} to app assets to replace non-Android versions"

                def sourceDir = file("${rootBuildDir}/nodejs-native-assets/nodejs-native-assets-${abiName}/node_modules")
                def targetDir = file("${rootProject.projectDir}/app/src/main/assets/public/${nodeDir}/node_modules")

                from sourceDir
                into targetDir
                include "**/*.node"
                includeEmptyDirs = false

                // Replace existing .node files (whether macOS, Linux, or Windows versions)
                // Works on both macOS and Linux build systems
                eachFile { fileCopyDetails ->
                    // Preserve the relative path structure
                    def relativePathStr = fileCopyDetails.relativePath.toString()
                    def targetFile = new File(targetDir, relativePathStr)
                    if (targetFile.exists()) {
                        logger.info("Replacing ${relativePathStr} with Android-built version for ${abiName}")
                    }
                }

                onlyIf {
                    sourceDir.exists()
                }
            }

            // Make the app's mergeAssets tasks depend on copying Android .node files
            // This ensures Android-built files replace non-Android versions (macOS, Linux, Windows) before assets are merged
            // Works on both macOS and Linux build systems
            gradle.projectsEvaluated {
                def appProject = rootProject.findProject(':app')
                if (appProject != null) {
                    def copyTask = project.tasks.findByName("CopyAndroidNodeFilesToAppAssets${abiName}")
                    if (copyTask != null) {
                        // Hook into all mergeAssets tasks (debug, release, etc.)
                        appProject.android.applicationVariants.all { variant ->
                            def mergeAssetsTask = appProject.tasks.findByName("merge${variant.name.capitalize()}Assets")
                            if (mergeAssetsTask != null) {
                                mergeAssetsTask.dependsOn copyTask
                                logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets will depend on CopyAndroidNodeFilesToAppAssets${abiName}")
                            }
                        }
                    }
                }
            }

            android.sourceSets.main.assets.srcDirs += "${rootBuildDir}/nodejs-native-assets/"
        }
    }
}.call()
