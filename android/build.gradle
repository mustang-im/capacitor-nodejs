plugins {
    id 'com.android.library'
}

ext {
    junitVersion = project.hasProperty('junitVersion') ? rootProject.ext.junitVersion : '4.13.2'
    androidxAppCompatVersion = project.hasProperty('androidxAppCompatVersion') ? rootProject.ext.androidxAppCompatVersion : '1.7.0'
    androidxJunitVersion = project.hasProperty('androidxJunitVersion') ? rootProject.ext.androidxJunitVersion : '1.2.1'
    androidxEspressoCoreVersion = project.hasProperty('androidxEspressoCoreVersion') ? rootProject.ext.androidxEspressoCoreVersion : '3.6.1'
}

android {
    namespace "net.hampoelz.capacitor.nodejs"
    compileSdk project.hasProperty('compileSdkVersion') ? rootProject.ext.compileSdkVersion : 35
    defaultConfig {
        minSdkVersion project.hasProperty('minSdkVersion') ? rootProject.ext.minSdkVersion : 23
        targetSdkVersion project.hasProperty('targetSdkVersion') ? rootProject.ext.targetSdkVersion : 35
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        externalNativeBuild {
            cmake {
                cppFlags ""
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    lint {
        abortOnError false
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    externalNativeBuild {
        cmake {
            path file('CMakeLists.txt')
        }
    }
    packaging {
        pickFirst 'lib/x86/libnode.so'
        pickFirst 'lib/armeabi-v7a/libnode.so'
        pickFirst 'lib/arm64-v8a/libnode.so'
        pickFirst 'lib/x86_64/libnode.so'
    }
}

repositories {
    google()
    mavenCentral()
}


dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation project(':capacitor-android')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

import org.gradle.internal.os.OperatingSystem
import org.gradle.util.GradleVersion

// Execute configuration during the configuration phase (not as a task)
// This code runs when the build.gradle is evaluated
{
    // Capture rootProject values during configuration phase for configuration cache compatibility
    def rootBuildDir = rootProject.buildDir
    def rootProjectDir = rootProject.projectDir
    def pluginProjectDir = project.projectDir

    // Get ABI filters from the app project's build.gradle file
    // Read the app's build.gradle to find abiFilters setting
    def appBuildGradle = file("${rootProjectDir}/app/build.gradle")
    def abiFilters = null

    // Check if splits.abi is enabled in app's build.gradle
    def splitsEnabled = false
    def splitAbis = null
    def universalApkEnabled = false

    // IMPORTANT: Clear ndk.abiFilters IMMEDIATELY to prevent any conflicts
    // Do this before any file parsing or other operations
    android.defaultConfig.ndk.abiFilters = null

    // ALWAYS parse the file first to detect splits (most reliable method)
    // This must happen before we try to set ndk.abiFilters to avoid conflicts
    if (appBuildGradle.exists()) {
        def buildGradleContent = appBuildGradle.text
        // Check if splits.abi is enabled - look for "splits { abi { enable true" pattern
        // Simple check: if we find "splits" followed by "abi" followed by "enable true"
        if (buildGradleContent.contains('splits') &&
            buildGradleContent.contains('abi') &&
            buildGradleContent.contains('enable true')) {
            // More specific check: ensure it's in the right context
            def splitsPattern = /splits\s*\{[\s\S]*?abi\s*\{[\s\S]*?enable\s+true/
            if (buildGradleContent =~ splitsPattern) {
                splitsEnabled = true
                logger.info("capacitor-nodejs: ✓ Detected splits.abi.enable = true in app build.gradle")

                // Check for universalApk setting
                def universalApkPattern = /universalApk\s+(true|false)/
                def universalApkMatch = buildGradleContent =~ universalApkPattern
                if (universalApkMatch.find()) {
                    universalApkEnabled = universalApkMatch.group(1) == 'true'
                    logger.info("capacitor-nodejs: Found universalApk = ${universalApkEnabled}")
                }

                // Extract ABI list from splits.abi.include - look for include within the abi block
                // Match: splits { abi { include 'arm64-v8a', 'x86_64' } }
                def abiBlockPattern = /splits\s*\{[\s\S]*?abi\s*\{([\s\S]*?)\}[\s\S]*?\}/
                def abiBlockMatch = buildGradleContent =~ abiBlockPattern
                if (abiBlockMatch.find()) {
                    def abiBlock = abiBlockMatch.group(1)
                    logger.info("capacitor-nodejs: Found abi block: ${abiBlock.take(200)}...")

                    // Look for include statement within the abi block
                    // Match: include 'arm64-v8a', 'x86_64' or include 'arm64-v8a'
                    def includePattern = /include\s+['"]([^'"]+)['"]\s*(?:,\s*['"]([^'"]+)['"])?/
                    def includeMatch = abiBlock =~ includePattern
                    if (includeMatch.find()) {
                        def filters = []
                        if (includeMatch.group(1)) filters.add(includeMatch.group(1))
                        if (includeMatch.group(2)) filters.add(includeMatch.group(2))
                        if (!filters.isEmpty()) {
                            splitAbis = filters as Set<String>
                            logger.info("capacitor-nodejs: Found splits.abi.include with ABIs: ${splitAbis}")
                        }
                    } else {
                        logger.warn("capacitor-nodejs: splits.abi enabled but could not find include statement")
                    }
                } else {
                    logger.warn("capacitor-nodejs: splits.abi enabled but could not extract abi block")
                }
            } else {
                logger.info("capacitor-nodejs: Found 'splits', 'abi', and 'enable true' but regex didn't match")
            }
        } else {
            logger.info("capacitor-nodejs: splits.abi not enabled (or not found in build.gradle)")
        }

        // Only look for ndk { abiFilters ... } if splits are not enabled
        if (!splitsEnabled) {
            // Look for ndk { abiFilters ... } pattern - match single or multiple filters
            // Pattern: abiFilters 'arm64-v8a', 'x86_64' or abiFilters 'arm64-v8a'
            def abiFiltersMatch = buildGradleContent =~ /abiFilters\s+['"]([^'"]+)['"]\s*(?:,\s*['"]([^'"]+)['"])?/
            if (abiFiltersMatch.find()) {
                def filters = []
                if (abiFiltersMatch.group(1)) filters.add(abiFiltersMatch.group(1))
                if (abiFiltersMatch.group(2)) filters.add(abiFiltersMatch.group(2))
                if (!filters.isEmpty()) {
                    abiFilters = filters as Set<String>
                    logger.info("capacitor-nodejs: Found ABI filters from app build.gradle: ${abiFilters}")
                }
            }
        } else if (splitAbis != null) {
            // Use ABIs from splits.abi.include
            abiFilters = splitAbis
            logger.info("capacitor-nodejs: Using ABIs from splits.abi.include: ${abiFilters}")
        }
    }

    // Also try to check the app project directly as a fallback (in case file parsing missed something)
    // But only if we haven't detected splits yet
    if (!splitsEnabled) {
        try {
            def appProject = rootProject.subprojects.find { it.path == ':app' }
            if (appProject != null && appProject.hasProperty('android')) {
                def appAndroid = appProject.android
                if (appAndroid.splits.abi.enable) {
                    splitsEnabled = true
                    def splitAbisList = appAndroid.splits.abi.include
                    if (splitAbisList != null && !splitAbisList.isEmpty()) {
                        splitAbis = splitAbisList as Set<String>
                        abiFilters = splitAbis
                        logger.info("capacitor-nodejs: ✓ Detected splits.abi.enable = true via app project (ABIs: ${splitAbis})")
                    }
                    // Check if universalApk is enabled
                    try {
                        universalApkEnabled = appAndroid.splits.abi.universalApk
                        logger.info("capacitor-nodejs: universalApk = ${universalApkEnabled} (via app project)")
                    } catch (Exception e) {
                        // universalApk might not be accessible
                    }
                }
            }
        } catch (Exception e) {
            // App project might not be evaluated yet, that's okay - file parsing should have caught it
            logger.info("capacitor-nodejs: Could not check app project directly: ${e.message}")
        }
    }

    // IMPORTANT: Clear ndk.abiFilters FIRST if splits are detected, before any other operations
    // This prevents Android from detecting a conflict during configuration phase
    if (splitsEnabled) {
        logger.info("capacitor-nodejs: Splits detected during configuration - explicitly clearing ndk.abiFilters to prevent conflicts")
        android.defaultConfig.ndk.abiFilters = null
    }

    // If no ABI filters found, check the plugin's android config (for backwards compatibility)
    // But only if splits are not enabled (to avoid conflicts)
    if (!splitsEnabled && abiFilters == null && android.defaultConfig.ndk.abiFilters != null && !android.defaultConfig.ndk.abiFilters.isEmpty()) {
        abiFilters = android.defaultConfig.ndk.abiFilters
    }

    // IMPORTANT: Explicitly clear ndk.abiFilters during configuration if splits are detected
    // This must happen BEFORE setting default ABI filters to prevent conflicts
    if (splitsEnabled) {
        // Already cleared above, but ensure it stays cleared
        android.defaultConfig.ndk.abiFilters = null

        // Use afterEvaluate to clear app's ndk.abiFilters as early as possible
        // This runs before Android's conflict check
        try {
            def appProject = rootProject.subprojects.find { it.path == ':app' }
            if (appProject != null) {
                appProject.afterEvaluate { proj ->
                    if (proj.hasProperty('android')) {
                        def appAndroid = proj.android
                        if (appAndroid.defaultConfig.ndk.abiFilters != null) {
                            logger.info("capacitor-nodejs: Clearing app's ndk.abiFilters in afterEvaluate (splits detected)")
                            appAndroid.defaultConfig.ndk.abiFilters = null
                        }
                    }
                }
            }
        } catch (Exception e) {
            logger.debug("capacitor-nodejs: Could not set up afterEvaluate for app project: ${e.message}")
        }

        // Also try to clear immediately if accessible
        try {
            def appProject = rootProject.subprojects.find { it.path == ':app' }
            if (appProject != null && appProject.hasProperty('android')) {
                def appAndroid = appProject.android
                if (appAndroid.defaultConfig.ndk.abiFilters != null) {
                    logger.info("capacitor-nodejs: Clearing app's ndk.abiFilters during configuration (splits detected)")
                    appAndroid.defaultConfig.ndk.abiFilters = null
                }
            }
        } catch (Exception e) {
            // App project might not be accessible during configuration, that's OK
            logger.debug("capacitor-nodejs: Could not clear app's ndk.abiFilters during configuration: ${e.message}")
        }
    }

    // If still no ABI filters, set defaults (but only if splits are not enabled)
    if ((abiFilters == null || abiFilters.isEmpty()) && !splitsEnabled) {
        // No abiFilter is defined for the build. Set it to the supported architectures.
        logger.warn("capacitor-nodejs detected no ABI filters were set. Will use [\"armeabi-v7a\", \"x86\", \"arm64-v8a\", \"x86_64\"].")
        abiFilters = ["armeabi-v7a", "x86", "arm64-v8a", "x86_64"] as Set<String>
    } else if (splitsEnabled && (abiFilters == null || abiFilters.isEmpty())) {
        // If splits are enabled but no ABIs detected, use defaults but don't set ndk.abiFilters
        logger.warn("capacitor-nodejs: Splits enabled but no ABIs detected, using defaults: [\"armeabi-v7a\", \"x86\", \"arm64-v8a\", \"x86_64\"]")
        abiFilters = ["armeabi-v7a", "x86", "arm64-v8a", "x86_64"] as Set<String>
    }

    // Store ABIs for use throughout the plugin (works for both splits and non-splits)
    // This variable will be used instead of android.defaultConfig.ndk.abiFilters
    def pluginAbiFilters = abiFilters

    // Set the ABI filters on plugin's ndk.abiFilters only if splits.abi is not enabled (they conflict)
    // When splits are enabled, we'll use pluginAbiFilters directly instead of ndk.abiFilters
    // Use projectsEvaluated to check splits after all projects are evaluated
    gradle.projectsEvaluated {
        // Re-check splits in case app project wasn't evaluated during configuration
        try {
            def appProject = rootProject.subprojects.find { it.path == ':app' }
            if (appProject != null && appProject.hasProperty('android')) {
                def appAndroid = appProject.android
                if (appAndroid.splits.abi.enable && !splitsEnabled) {
                    splitsEnabled = true
                    def splitAbisList = appAndroid.splits.abi.include
                    if (splitAbisList != null && !splitAbisList.isEmpty()) {
                        splitAbis = splitAbisList as Set<String>
                        abiFilters = splitAbis
                        pluginAbiFilters = abiFilters
                        logger.info("capacitor-nodejs: ✓ Detected splits.abi.enable = true via projectsEvaluated (ABIs: ${abiFilters})")
                    }
                    // Check universalApk setting
                    try {
                        universalApkEnabled = appAndroid.splits.abi.universalApk
                        logger.info("capacitor-nodejs: universalApk = ${universalApkEnabled} (via projectsEvaluated)")
                    } catch (Exception e) {
                        logger.info("capacitor-nodejs: Could not read universalApk: ${e.message}")
                    }
                }
            }
        } catch (Exception e) {
            logger.info("capacitor-nodejs: Could not re-check splits in projectsEvaluated: ${e.message}")
        }

        // Set or clear ndk.abiFilters based on splits detection
        if (splitsEnabled) {
            // Clear ndk.abiFilters if splits are enabled (they conflict)
            // Clear both plugin's and app's ndk.abiFilters
            if (android.defaultConfig.ndk.abiFilters != null) {
                logger.info("capacitor-nodejs: Clearing plugin's ndk.abiFilters because splits.abi is enabled")
                android.defaultConfig.ndk.abiFilters = null
            }
            // Also clear app's ndk.abiFilters if it exists
            try {
                def appProject = rootProject.subprojects.find { it.path == ':app' }
                if (appProject != null && appProject.hasProperty('android')) {
                    def appAndroid = appProject.android
                    if (appAndroid.defaultConfig.ndk.abiFilters != null) {
                        logger.info("capacitor-nodejs: Clearing app's ndk.abiFilters because splits.abi is enabled")
                        appAndroid.defaultConfig.ndk.abiFilters = null
                    }
                }
            } catch (Exception e) {
                logger.warn("capacitor-nodejs: Could not clear app's ndk.abiFilters: ${e.message}")
            }
            logger.info("capacitor-nodejs: Splits.abi is enabled. Using ABIs: ${pluginAbiFilters}")
        } else {
            // Set ndk.abiFilters only if splits are not enabled
            android.defaultConfig.ndk.abiFilters = abiFilters
            logger.info("capacitor-nodejs: Set ndk.abiFilters to: ${abiFilters}")
        }
    }

    logger.info("capacitor-nodejs: Configuration phase - splitsEnabled=${splitsEnabled}, abiFilters=${abiFilters}")
    // IMPORTANT: Do NOT set ndk.abiFilters during configuration phase
    // Wait until projectsEvaluated to ensure splits are properly detected and avoid conflicts
    logger.info("capacitor-nodejs: Will set/clear ndk.abiFilters in projectsEvaluated after splits detection")

    // Configure androidResources to exclude certain files from the APK
    // Exclude build-time helper scripts and config files that shouldn't be in the final APK
    // Patterns match paths relative to the assets directory in the APK
    // Note: Patterns are matched against the full path within assets/, so we need to match both root and public/ paths
    def ignorePattern = '*.gz:build-native-modules-MacOS-helper-script.sh:public/build-native-modules-MacOS-helper-script.sh:**/build-native-modules-MacOS-helper-script.sh:NODEJS_MOBILE_BUILD_NATIVE_MODULES_VALUE.txt:public/NODEJS_MOBILE_BUILD_NATIVE_MODULES_VALUE.txt'

    // When splits are enabled and universalApk is false, we DON'T exclude .node files from main assets
    // because split APKs need .node files in main assets (each split APK only contains one architecture)
    // Only exclude when universalApk is true (then .node files go to architecture-specific assets)
    if (splitsEnabled && universalApkEnabled) {
        // Exclude .node files from public/nodejs/node_modules/ in main assets for universal APK
        // This pattern matches: assets/public/nodejs/node_modules/**/*.node
        ignorePattern += ':public/nodejs/node_modules/**/*.node'
        logger.info("capacitor-nodejs: Excluding .node files from assets/public/ (universal APK only) using pattern: ${ignorePattern}")
    }

    android.androidResources {
        ignoreAssetsPattern ignorePattern
    }

    if (GradleVersion.current() < GradleVersion.version("4.0")) {
        android.sourceSets.main.jniLibs.srcDirs += 'libs/cdvnodejsmobile/libnode/bin/'
    }

    // Get Capacitor config to determine webDir and nodeDir
    String projectWWW // www/assets folder from the Application project (Capacitor uses 'public')
    String nodeDir = "nodejs" // Default nodeDir from CapacitorNodeJS plugin config
    String webDir = "www" // Default webDir
    boolean bundleMode = false // Default bundle mode

    // Try to read capacitor.config.json
    def capacitorConfigFile = file("${rootProjectDir}/capacitor.config.json")
    def capacitorConfig = null
    if (capacitorConfigFile.exists() && capacitorConfigFile.name.endsWith('.json')) {
        capacitorConfig = new groovy.json.JsonSlurper().parse(capacitorConfigFile)
        webDir = capacitorConfig.webDir ?: "www"
        def pluginConfig = capacitorConfig.plugins?.CapacitorNodeJS
        if (pluginConfig?.nodeDir) {
            nodeDir = pluginConfig.nodeDir
        }
        if (pluginConfig?.bundle != null) {
            bundleMode = pluginConfig.bundle == true
        }
    }

    // For Capacitor, webDir is relative to project root, and gets copied to android/app/src/main/assets/public
    // Use rootProject.projectDir to get the app's android directory, not the plugin's directory (important when using yarn link)
    projectWWW = "${rootProject.projectDir}/app/src/main/assets/public"

    // Verify the www folder exists
    if (!file(projectWWW).exists()) {
        throw new GradleException('capacitor-nodejs couldn\'t find the www/public folder in the Android project. Expected at: ' + projectWWW)
    }

    String shouldRebuildNativeModules = System.getenv('NODEJS_MOBILE_BUILD_NATIVE_MODULES')

    if (shouldRebuildNativeModules == null) {
        // If the environment variable is not set right now, check if it has been saved to a file during
        // the Capacitor sync/prepare phase.
        def nativeModulesPreferenceFile = file("${projectWWW}/NODEJS_MOBILE_BUILD_NATIVE_MODULES_VALUE.txt")
        if (nativeModulesPreferenceFile.exists()) {
            shouldRebuildNativeModules = nativeModulesPreferenceFile.text.trim()
        }
    }

    if (shouldRebuildNativeModules == null) {
        // If build native modules preference is not set, try to find .gyp files to turn it on.
        shouldRebuildNativeModules = "0"
        def nodeDirPath = file("${projectWWW}/${nodeDir}/")
        if (nodeDirPath.exists()) {
            def gypFilesTree = fileTree(dir: nodeDirPath, include: "**/*.gyp")
            gypFilesTree.visit { gypFile ->
                if (!gypFile.isDirectory()) {
                    // It's a .gyp file.
                    shouldRebuildNativeModules = "1"
                    gypFile.stopVisiting()
                }
            }
        }
    }

    if (shouldRebuildNativeModules == "1") {
        // Use pluginAbiFilters (works for both splits and non-splits configurations)
        def abisToBuild = splitsEnabled ? pluginAbiFilters : (android.defaultConfig.ndk.abiFilters ?: pluginAbiFilters)

        // Capture bundleMode in a final variable for use in closures
        final boolean finalBundleMode = bundleMode

        // Task to clean main assets node_modules when universalApk is enabled (bundle mode)
        // Register once outside the ABI loop
        // NOTE: This task should NOT delete files from the source location that CopyNodeProjectAssets needs.
        // Instead, it should only clean up after all copy tasks have completed.
        // For universal APK, the architecture-specific assets are used, so we can clean the main assets.
        if (finalBundleMode && splitsEnabled && universalApkEnabled) {
            if (project.tasks.findByName("BundleNodeModulesFromMainAssets") == null) {
                tasks.register("BundleNodeModulesFromMainAssets") {
                    description = "Delete node_modules from main assets (bundle mode, universal APK)"

                    // Depend on all CopyNodeProjectAssets tasks to ensure they complete first
                    def abisForDeps = pluginAbiFilters
                    abisForDeps.each { abi ->
                        def copyTask = project.tasks.findByName("CopyNodeProjectAssets${abi}")
                        if (copyTask != null) {
                            dependsOn copyTask
                        }
                    }

                    def nodeModulesPath = "${rootProject.projectDir}/app/src/main/assets/public/${nodeDir}/node_modules"
                    def nodeModulesDir = file(nodeModulesPath)
                    def taskLogger = logger

                    doLast {
                        if (!nodeModulesDir.exists()) {
                            taskLogger.info("BundleNodeModulesFromMainAssets: Directory ${nodeModulesPath} does not exist, skipping")
                            return
                        }

                        try {
                            // Delete non-essential files but preserve files needed for CopyNodeProjectAssets
                            // CopyNodeProjectAssets needs the source files to copy to temp build location
                            // So we preserve package.json files and build artifacts that might be needed
                            int deletedCount = 0
                            java.nio.file.Files.walkFileTree(nodeModulesDir.toPath(), new java.nio.file.FileVisitor<java.nio.file.Path>() {
                                java.nio.file.FileVisitResult preVisitDirectory(java.nio.file.Path dir, java.nio.file.attribute.BasicFileAttributes attrs) {
                                    return java.nio.file.FileVisitResult.CONTINUE
                                }

                                java.nio.file.FileVisitResult visitFile(java.nio.file.Path file, java.nio.file.attribute.BasicFileAttributes attrs) {
                                    def fileName = file.fileName.toString()
                                    // Keep .node files (already moved to architecture-specific assets),
                                    // package.json files (needed for path resolution and CopyNodeProjectAssets),
                                    // and dir.list/file.list
                                    if (!fileName.endsWith('.node') &&
                                        !fileName.equals('package.json') &&
                                        !fileName.equals('dir.list') &&
                                        !fileName.equals('file.list') &&
                                        !fileName.endsWith('.gyp') &&
                                        !fileName.endsWith('.gypi') &&
                                        !fileName.endsWith('.mk') &&
                                        !fileName.endsWith('.Makefile') &&
                                        !file.toString().contains('/build/') &&
                                        !file.toString().contains('/deps/')) {
                                        try {
                                            java.nio.file.Files.delete(file)
                                            deletedCount++
                                        } catch (Exception e) {
                                            taskLogger.warn("BundleNodeModulesFromMainAssets: Failed to delete ${file}: ${e.message}")
                                        }
                                    }
                                    return java.nio.file.FileVisitResult.CONTINUE
                                }

                                java.nio.file.FileVisitResult visitFileFailed(java.nio.file.Path file, java.io.IOException exc) {
                                    return java.nio.file.FileVisitResult.CONTINUE
                                }

                                java.nio.file.FileVisitResult postVisitDirectory(java.nio.file.Path dir, java.io.IOException exc) {
                                    // Delete empty directories (except node_modules itself and directories containing package.json or build artifacts)
                                    try {
                                        if (dir != nodeModulesDir.toPath()) {
                                            def dirFile = dir.toFile()
                                            def files = dirFile.listFiles()
                                            if (files == null || files.length == 0) {
                                                // Only delete if it's not a build directory or deps directory
                                                if (!dir.toString().contains('/build/') && !dir.toString().contains('/deps/')) {
                                                    java.nio.file.Files.delete(dir)
                                                }
                                            }
                                        }
                                    } catch (Exception e) {
                                        // Directory not empty or other error, skip
                                    }
                                    return java.nio.file.FileVisitResult.CONTINUE
                                }
                            })
                            taskLogger.info("BundleNodeModulesFromMainAssets: Deleted ${deletedCount} non-essential files from main assets node_modules (preserved package.json and build artifacts for CopyNodeProjectAssets)")
                        } catch (Exception e) {
                            taskLogger.warn("BundleNodeModulesFromMainAssets: Failed to clean node_modules directory: ${e.message}")
                        }
                    }

                    onlyIf {
                        finalBundleMode && nodeModulesDir.exists()
                    }
                }
            }
        }

        // Determine npm command name - use helper script on macOS if npm might not be in PATH
        // (e.g., when Gradle is run from Android Studio). The helper script is created by
        // the Capacitor prepare hook with the PATH that was available during sync/prepare.
        String npmCommandName = 'npm'
        String npmBinPath = null
        if (OperatingSystem.current().isMacOsX()) {
            // Check if helper script exists - if it does, prefer it since it has the correct PATH
            def helperScript = file("${projectWWW}/build-native-modules-MacOS-helper-script.sh")
            if (helperScript.exists()) {
                npmCommandName = '../build-native-modules-MacOS-helper-script.sh'
            } else {
                // If no helper script, try to find npm using multiple methods
                // First, try to find npm in current PATH
                def npmPath = System.getenv('PATH')?.split(File.pathSeparator)?.find { path ->
                    new File(path, 'npm').exists() || new File(path, 'npm.cmd').exists()
                }

                // If not found in PATH, try using 'which npm' command
                if (npmPath == null) {
                    try {
                        def process = "which npm".execute()
                        process.waitFor()
                        if (process.exitValue() == 0) {
                            def npmFullPath = process.text.trim()
                            npmPath = new File(npmFullPath).parent
                        }
                    } catch (Exception e) {
                        // Ignore - will try nvm locations next
                    }
                }

                // If still not found, try common nvm locations
                if (npmPath == null) {
                    def homeDir = System.getProperty("user.home")
                    def nvmDir = new File(homeDir, ".nvm")
                    if (nvmDir.exists()) {
                        def nodeVersions = new File(nvmDir, "versions/node")
                        if (nodeVersions.exists()) {
                            def latestNode = nodeVersions.listFiles()?.findAll { it.isDirectory() }?.sort()?.last()
                            if (latestNode != null) {
                                def nvmNpmPath = new File(latestNode, "bin")
                                if (nvmNpmPath.exists() && new File(nvmNpmPath, "npm").exists()) {
                                    npmPath = nvmNpmPath.absolutePath
                                }
                            }
                        }
                    }
                }

                if (npmPath != null) {
                    npmBinPath = npmPath
                    logger.info("Found npm at: ${npmPath}")
                } else {
                    logger.warn("Couldn't find npm in the PATH for building native modules. Will try to use 'npm' directly.")
                }
            }
        }

        // Capture npmBinPath in a final variable for use in closures
        final String finalNpmBinPath = npmBinPath

        abisToBuild.each { abiName ->
            def tempArch
            switch (abiName) {
                case 'armeabi-v7a':
                    tempArch = 'arm'
                    break
                case 'arm64-v8a':
                    tempArch = 'arm64'
                    break
                default:
                    tempArch = abiName
            }

            def tempCcVer = '4.9'
            def tempDestCpu, tempV8Arch, tempSuffix, tempToolchainName
            switch (tempArch) {
                case 'arm':
                    tempDestCpu = 'arm'
                    tempV8Arch = 'arm'
                    tempSuffix = 'arm-linux-androideabi'
                    tempToolchainName = 'arm-linux-androideabi'
                    break
                case 'x86':
                    tempDestCpu = 'ia32'
                    tempV8Arch = 'ia32'
                    tempSuffix = 'i686-linux-android'
                    tempToolchainName = 'x86'
                    break
                case 'x86_64':
                    tempDestCpu = 'x64'
                    tempV8Arch = 'x64'
                    tempSuffix = 'x86_64-linux-android'
                    tempToolchainName = 'x86_64'
                    break
                case 'arm64':
                    tempDestCpu = 'arm64'
                    tempV8Arch = 'arm64'
                    tempSuffix = 'aarch64-linux-android'
                    tempToolchainName = 'aarch64'
                    break
                default:
                    throw new GradleException("Unsupported architecture for nodejs-mobile native modules: ${tempArch}")
            }

            def ndkBundlePath = android.ndkDirectory
            def makeToolchainScript = "${ndkBundlePath}/build/tools/make-standalone-toolchain.sh"
            def useNdkToolchain = !file(makeToolchainScript).exists() // NDK 27+ doesn't have make-standalone-toolchain.sh

            def standaloneToolchain
            def npmToolchainAr
            def npmToolchainCc
            def npmToolchainCxx
            def npmToolchainLink

            if (useNdkToolchain) {
                // For NDK 27+, use the NDK's built-in toolchain directly
                def hostOs = OperatingSystem.current().isMacOsX() ? 'darwin-x86_64' : (OperatingSystem.current().isLinux() ? 'linux-x86_64' : 'windows-x86_64')
                def ndkToolchainBase = "${ndkBundlePath}/toolchains/llvm/prebuilt/${hostOs}"
                def apiLevel = '21' // Minimum API level for nodejs-mobile
                standaloneToolchain = ndkToolchainBase // For compatibility with TOOLCHAIN env var
                npmToolchainAr = "${ndkToolchainBase}/bin/llvm-ar"
                // NDK 27+ uses unified toolchain with architecture prefix
                def clangArch
                switch (tempArch) {
                    case 'arm':
                        clangArch = 'armv7a'
                        break
                    case 'arm64':
                        clangArch = 'aarch64'
                        break
                    case 'x86':
                        clangArch = 'i686'
                        break
                    case 'x86_64':
                        clangArch = 'x86_64'
                        break
                    default:
                        clangArch = tempArch
                }
                npmToolchainCc = "${ndkToolchainBase}/bin/${clangArch}-linux-android${apiLevel}-clang"
                npmToolchainCxx = "${ndkToolchainBase}/bin/${clangArch}-linux-android${apiLevel}-clang++"
                npmToolchainLink = npmToolchainCxx
            } else {
                // For older NDK versions, use standalone toolchain
                standaloneToolchain = "${rootBuildDir}/standalone-toolchains/${tempToolchainName}"
                npmToolchainAr = "${standaloneToolchain}/bin/${tempSuffix}-ar"
                npmToolchainCc = "${standaloneToolchain}/bin/${tempSuffix}-clang"
                npmToolchainCxx = "${standaloneToolchain}/bin/${tempSuffix}-clang++"
                npmToolchainLink = npmToolchainCxx
            }

            // hostOs for GYP defines (different from NDK host OS)
            def hostOsGyp = OperatingSystem.current().isMacOsX() ? 'mac' : (OperatingSystem.current().isLinux() ? 'linux' : 'windows')
            def npmGypDefines = "target_arch=${tempArch} v8_target_arch=${tempV8Arch} android_target_arch=${tempArch} host_os=${hostOsGyp} OS=android"

            tasks.register("CopyNodeProjectAssets${abiName}", Copy) {
                description = "Copying node assets to build native modules for ${abiName}."
                def nodeDirPath = file("${projectWWW}/${nodeDir}/")
                def buildDirPath = "${rootBuildDir}/nodejs-native-assets-temp-build/nodejs-native-assets-${abiName}/"

                from nodeDirPath
                into new File(buildDirPath, nodeDir)
                // Symlinks to binaries are resolved by Capacitor sync and Gradle during the copy, causing build time errors.
                // The original project's .bin folder will be added to the path while building in the BuildNpmModules tasks.
                exclude "**/.bin"
                // Exclude prebuilt binaries for other platforms (macOS, Linux, Windows) - not needed for Android
                exclude "**/prebuilds/**"

                inputs.files fileTree(dir: nodeDirPath).exclude { details ->
                    // We shouldn't need to rebuild native code if there are only changes in the Node.js project javascript files.
                    !details.isDirectory() &&
                    details.path.endsWith('.js') &&
                    !details.path.startsWith('node_modules/')
                }
                outputs.file("${buildDirPath}/copy.timestamp")

                doFirst {
                    def buildDir = new File(buildDirPath)
                    if (buildDir.exists()) {
                        buildDir.deleteDir()
                    }
                }

                doLast {
                    if (OperatingSystem.current().isMacOsX()) {
                        // Copy the helper script for calling npm when building in Android Studio on macOS.
                        def helperScript = new File(projectWWW, "build-native-modules-MacOS-helper-script.sh")
                        if (helperScript.exists()) {
                            def targetScript = new File(buildDirPath, helperScript.name)
                            helperScript.withInputStream { input ->
                                targetScript.withOutputStream { output ->
                                    output << input
                                }
                            }
                            // Make the script executable (required for Gradle to run it)
                            targetScript.setExecutable(true)
                        }
                    }

                    new File(buildDirPath, "copy.timestamp").text = new Date().format('yyyy-MM-dd HH:mm:ss')
                }
            }

            tasks.register("MakeToolchain${abiName}", Exec) {
                description = "Building a native toolchain to compile nodejs-mobile native modules for ${abiName}."

                if (useNdkToolchain) {
                    // For NDK 27+, toolchain is already available, no need to create it
                    executable = 'true' // No-op command
                    args = []
                    outputs.upToDateWhen { true }
                } else {
                    // For older NDK versions, create standalone toolchain
                    executable = makeToolchainScript
                    args "--toolchain=${tempToolchainName}-${tempCcVer}", "--arch=${tempArch}", "--install-dir=${standaloneToolchain}", "--stl=libc++", "--force", "--platform=android-22"
                    outputs.file standaloneToolchain
                }
            }

            tasks.register("BuildNpmModules${abiName}", Exec) {
                dependsOn "MakeToolchain${abiName}"
                dependsOn "CopyNodeProjectAssets${abiName}"
                description = "Building native modules for ${abiName}."

                def buildDir = "${rootBuildDir}/nodejs-native-assets-temp-build/nodejs-native-assets-${abiName}"
                inputs.file("${buildDir}/copy.timestamp")
                outputs.dir("${buildDir}/${nodeDir}/")

                workingDir "${buildDir}/${nodeDir}/"

                // If using helper script, use absolute path to avoid path resolution issues
                def actualNpmCommand = npmCommandName
                if (npmCommandName == '../build-native-modules-MacOS-helper-script.sh') {
                    def helperScriptPath = new File(buildDir, 'build-native-modules-MacOS-helper-script.sh')
                    if (helperScriptPath.exists()) {
                        actualNpmCommand = helperScriptPath.absolutePath
                    }
                }

                // Look for nodejs-mobile-gyp in the directory where Capacitor CLI is called from
                // rootProjectDir is mobile/android, so ../ goes to mobile/ (where Capacitor CLI is called from)
                def npmGypPath = "${rootProjectDir}/../node_modules/nodejs-mobile-gyp/bin/node-gyp.js"
                def npmGypPathFile = file(npmGypPath)

                if (!npmGypPathFile.exists()) {
                    throw new GradleException("Could not find nodejs-mobile-gyp. Expected at: ${npmGypPathFile.absolutePath}")
                }

                // Ensure nodejs-mobile-gyp is used instead of regular node-gyp
                doFirst {
                    def buildNodeModules = new File("${buildDir}/${nodeDir}/node_modules")
                    if (buildNodeModules.exists()) {
                        // Create symlink to nodejs-mobile-gyp in node_modules/.bin so npm uses it
                        def binDir = new File(buildNodeModules, ".bin")
                        if (!binDir.exists()) {
                            binDir.mkdirs()
                        }
                        def nodeGypLink = new File(binDir, "node-gyp")
                        def nodeGypJsLink = new File(binDir, "node-gyp.js")
                        def absoluteGypPath = new File(npmGypPath).absolutePath

                        // Remove existing links if they exist
                        if (nodeGypLink.exists()) nodeGypLink.delete()
                        if (nodeGypJsLink.exists()) nodeGypJsLink.delete()

                        // Create symlinks to nodejs-mobile-gyp
                        java.nio.file.Files.createSymbolicLink(
                            nodeGypLink.toPath(),
                            new File(absoluteGypPath).toPath()
                        )
                        java.nio.file.Files.createSymbolicLink(
                            nodeGypJsLink.toPath(),
                            new File(absoluteGypPath).toPath()
                        )
                        logger.info("Created symlinks to nodejs-mobile-gyp at ${absoluteGypPath}")
                    }
                }

                commandLine actualNpmCommand, '--verbose', 'rebuild', '--build-from-source'

                // Set PATH to include npm if we found it but it's not in the default PATH
                if (finalNpmBinPath != null) {
                    def currentPath = System.getenv('PATH') ?: ''
                    def newPath = finalNpmBinPath + File.pathSeparator + currentPath
                    environment 'PATH', newPath
                }

                environment 'npm_config_node_engine', 'v8'
                // Use libnode directory - it's in android/libnode
                environment 'npm_config_nodedir', "${pluginProjectDir}/libnode"
                environment 'npm_config_node_gyp', npmGypPath
                environment 'npm_config_arch', tempArch
                environment 'npm_config_platform', 'android'
                environment 'npm_config_format', 'make-android'

                // Adds the CLI directory's .bin to the path. All build tools should be in node_modules/.bin
                def cliBin = file("${rootProjectDir}/../node_modules/.bin")
                if (cliBin.exists()) {
                    def pathSeparator = System.getProperty("path.separator")
                    environment 'PATH', "${cliBin.absolutePath}${pathSeparator}${System.env.PATH}"
                    logger.info("capacitor-nodejs: Added to PATH: ${cliBin.absolutePath}")
                }

                environment 'TOOLCHAIN', standaloneToolchain
                environment 'AR', npmToolchainAr
                environment 'CC', npmToolchainCc
                environment 'CXX', npmToolchainCxx
                environment 'LINK', npmToolchainLink
                environment 'GYP_DEFINES', npmGypDefines
            }

            tasks.register("CopyBuiltNpmAssets${abiName}", Sync) {
                dependsOn "BuildNpmModules${abiName}"
                description = "Copying node assets with build native modules for ${abiName}."
                from "${rootBuildDir}/nodejs-native-assets-temp-build/nodejs-native-assets-${abiName}/${nodeDir}/"
                into "${rootBuildDir}/nodejs-native-assets/nodejs-native-assets-${abiName}/"
                includeEmptyDirs = false
                include '**/*.node'
                // Exclude prebuilt binaries for other platforms (macOS, Linux, Windows) - not needed for Android
                exclude '**/prebuilds/**'
            }

            tasks.register("GenerateNodeNativeAssetsLists${abiName}") {
                dependsOn "CopyBuiltNpmAssets${abiName}"
                description = "Generates a list for runtime copying"

                def assetsDir = file("${rootBuildDir}/nodejs-native-assets/nodejs-native-assets-${abiName}/")
                inputs.dir assetsDir
                outputs.file "${assetsDir}/file.list"
                outputs.file "${assetsDir}/dir.list"

                doLast {
                    if (!assetsDir.exists()) {
                        // If the native assets folder doesn't exist from the copy task, skip the creation of the file.list
                        return
                    }

                    // Use new File() instead of file() for configuration cache compatibility
                    def fileListPath = new File(assetsDir, "file.list")
                    def dirListPath = new File(assetsDir, "dir.list")
                    // Use File.delete() instead of Gradle's delete() for configuration cache compatibility
                    if (fileListPath.exists()) fileListPath.delete()
                    if (dirListPath.exists()) dirListPath.delete()

                    def fileList = new StringBuilder()
                    def dirList = new StringBuilder()

                    // Use Java File API for configuration cache compatibility
                    def assetsDirFile = assetsDir instanceof File ? assetsDir : new File(assetsDir.toString())
                    def basePath = assetsDirFile.absolutePath

                    // Use Files.walkFileTree for recursive directory traversal (configuration cache compatible)
                    java.nio.file.Files.walkFileTree(assetsDirFile.toPath(), new java.nio.file.FileVisitor<java.nio.file.Path>() {
                        java.nio.file.FileVisitResult preVisitDirectory(java.nio.file.Path dir, java.nio.file.attribute.BasicFileAttributes attrs) {
                            if (dir != assetsDirFile.toPath()) {
                                def relativePath = basePath.length() > 0 ? dir.toString().substring(basePath.length() + 1) : dir.toString()
                                dirList.append("${relativePath}\n")
                            }
                            return java.nio.file.FileVisitResult.CONTINUE
                        }
                        java.nio.file.FileVisitResult visitFile(java.nio.file.Path file, java.nio.file.attribute.BasicFileAttributes attrs) {
                            def relativePath = basePath.length() > 0 ? file.toString().substring(basePath.length() + 1) : file.toString()
                            fileList.append("${relativePath}\n")
                            return java.nio.file.FileVisitResult.CONTINUE
                        }
                        java.nio.file.FileVisitResult visitFileFailed(java.nio.file.Path file, java.io.IOException exc) {
                            return java.nio.file.FileVisitResult.CONTINUE
                        }
                        java.nio.file.FileVisitResult postVisitDirectory(java.nio.file.Path dir, java.io.IOException exc) {
                            return java.nio.file.FileVisitResult.CONTINUE
                        }
                    })

                    fileListPath.text = fileList.toString()
                    dirListPath.text = dirList.toString()
                }
            }

            tasks.named('preBuild').configure {
                dependsOn "GenerateNodeNativeAssetsLists${abiName}"
            }

            // Copy Android-built .node files to the app's assets to replace non-Android versions (macOS, Linux, Windows)
            // When splits are enabled, we need to handle:
            // 1. Split APKs: copy to main assets (assets/) - each APK only contains one architecture
            // 2. Universal APK (if universalApk true): copy to architecture-specific subdirectories to avoid conflicts
            // This works on both macOS and Linux build systems

            // Capture values from outer scope for use in closures
            def currentSplitsEnabled = splitsEnabled
            def currentUniversalApkEnabled = universalApkEnabled

            // Task 1: Copy to main assets for split APKs (when splits enabled but universalApk is false)
            // Each split APK only contains one architecture, so we can put .node files directly in main assets
            logger.info("capacitor-nodejs: Checking split task registration for ${abiName}: splitsEnabled=${currentSplitsEnabled}, universalApkEnabled=${currentUniversalApkEnabled}")
            if (currentSplitsEnabled && !currentUniversalApkEnabled) {
                logger.info("capacitor-nodejs: Registering CopyAndroidNodeFilesToSplitAssets${abiName}")
                tasks.register("CopyAndroidNodeFilesToSplitAssets${abiName}", Copy) {
                    dependsOn "CopyBuiltNpmAssets${abiName}"
                    description = "Copy Android-built .node files for ${abiName} to main assets for split APKs"

                    // Depend on all CopyNodeProjectAssets tasks to ensure they all complete first
                    def abisForDeps = pluginAbiFilters
                    abisForDeps.each { otherAbi ->
                        dependsOn "CopyNodeProjectAssets${otherAbi}"
                    }

                    // Also depend on bundle task if enabled, since it moves .node files to build/Release
                    if (finalBundleMode) {
                        def bundleTask = project.tasks.findByName("BundleNodeModulesForUniversal${abiName}")
                        if (bundleTask != null) {
                            dependsOn bundleTask
                        }
                    }

                    // Also depend on remove task to ensure wrong-architecture files are deleted from main assets first
                    def removeMainTask = project.tasks.findByName("RemoveNodeFilesFromMainAssets")
                    if (removeMainTask != null) {
                        dependsOn removeMainTask
                    }

                    // Source: architecture-specific assets (could be in node_modules or build/Release after bundling)
                    def sourceDirPath = "${rootProject.projectDir}/app/src/main/assets-${abiName}/public/${nodeDir}"
                    def sourceDir = file(sourceDirPath)
                    def targetDirPath = "${rootProject.projectDir}/app/src/main/assets/public/${nodeDir}/node_modules"
                    def targetDir = file(targetDirPath)
                    def taskLogger = logger

                    from sourceDir
                    into targetDir
                    include "**/*.node"
                    includeEmptyDirs = false
                    exclude "**/prebuilds/**"

                    eachFile { fileCopyDetails ->
                        def relativePathStr = fileCopyDetails.relativePath.toString()
                        def targetFile = new File(targetDirPath, relativePathStr)
                        if (targetFile.exists()) {
                            taskLogger.info("Replacing ${relativePathStr} with Android-built version for ${abiName} (split APK)")
                        } else {
                            taskLogger.info("Copying ${relativePathStr} from ${abiName} assets to main assets for split APK")
                        }
                    }

                    onlyIf {
                        sourceDir.exists()
                    }
                }
            }

            // Task 2: Copy to architecture-specific assets for universal APK (when universalApk is true)
            // Universal APK contains all architectures, so we need architecture-specific directories to avoid conflicts
            if (currentSplitsEnabled && currentUniversalApkEnabled) {
                tasks.register("CopyAndroidNodeFilesToUniversalAssets${abiName}", Copy) {
                    dependsOn "CopyBuiltNpmAssets${abiName}"
                    description = "Copy Android-built .node files for ${abiName} to architecture-specific assets for universal APK"

                    // Depend on all CopyNodeProjectAssets tasks to ensure they all complete first
                    def abisForDeps = pluginAbiFilters
                    abisForDeps.each { otherAbi ->
                        dependsOn "CopyNodeProjectAssets${otherAbi}"
                    }

                    def sourceDir = file("${rootBuildDir}/nodejs-native-assets/nodejs-native-assets-${abiName}/node_modules")
                    def targetDirPath = "${rootProject.projectDir}/app/src/main/assets-${abiName}/public/${nodeDir}/node_modules"
                    def targetDir = file(targetDirPath)
                    def taskLogger = logger

                    from sourceDir
                    into targetDir
                    include "**/*.node"
                    includeEmptyDirs = false
                    exclude "**/prebuilds/**"

                    eachFile { fileCopyDetails ->
                        def relativePathStr = fileCopyDetails.relativePath.toString()
                        def targetFile = new File(targetDirPath, relativePathStr)
                        if (targetFile.exists()) {
                            taskLogger.info("Replacing ${relativePathStr} with Android-built version for ${abiName} (universal APK)")
                        }
                    }

                    onlyIf {
                        sourceDir.exists()
                    }
                }

                // Also copy to main assets for split APKs (when universalApk is enabled)
                // Split APKs need .node files in main assets, not just architecture-specific assets
                // Sanitize ABI name for task name (remove hyphens and underscores)
                def abiSanitizedForTask = abiName.replaceAll('-', '').replaceAll('_', '')
                tasks.register("CopyAndroidNodeFilesToMainAssetsForSplit${abiSanitizedForTask}", Copy) {
                    dependsOn "CopyAndroidNodeFilesToUniversalAssets${abiName}"
                    // Also depend on bundle task if enabled, since it moves .node files to build/Release
                    if (finalBundleMode) {
                        def bundleTask = project.tasks.findByName("BundleNodeModulesForUniversal${abiName}")
                        if (bundleTask != null) {
                            dependsOn bundleTask
                        }
                    }
                    description = "Copy Android-built .node files for ${abiName} from architecture-specific assets to main assets for split APKs (universal APK)"

                    // Source: architecture-specific assets (could be in node_modules or build/Release after bundling)
                    def sourceDirPath = "${rootProject.projectDir}/app/src/main/assets-${abiName}/public/${nodeDir}"
                    def sourceDir = file(sourceDirPath)
                    def targetDirPath = "${rootProject.projectDir}/app/src/main/assets/public/${nodeDir}/node_modules"
                    def targetDir = file(targetDirPath)
                    def taskLogger = logger

                    from sourceDir
                    into targetDir
                    include "**/*.node"
                    includeEmptyDirs = false

                    eachFile { fileCopyDetails ->
                        def relativePathStr = fileCopyDetails.relativePath.toString()
                        taskLogger.info("Copying ${relativePathStr} from ${abiName} assets to main assets for split APK")
                    }

                    onlyIf {
                        sourceDir.exists()
                    }
                }
            }

            // Task 3: Copy to main assets when no splits are enabled
            tasks.register("CopyAndroidNodeFilesToAppAssets${abiName}", Copy) {
                dependsOn "CopyBuiltNpmAssets${abiName}"
                description = "Copy Android-built .node files for ${abiName} to main assets (no splits)"

                // Depend on all CopyNodeProjectAssets tasks to ensure they all complete first
                def abisForDeps = android.defaultConfig.ndk.abiFilters ?: pluginAbiFilters
                abisForDeps.each { otherAbi ->
                    dependsOn "CopyNodeProjectAssets${otherAbi}"
                }

                def sourceDir = file("${rootBuildDir}/nodejs-native-assets/nodejs-native-assets-${abiName}/node_modules")
                def targetDirPath = "${rootProject.projectDir}/app/src/main/assets/public/${nodeDir}/node_modules"
                def targetDir = file(targetDirPath)
                def taskLogger = logger

                from sourceDir
                into targetDir
                include "**/*.node"
                includeEmptyDirs = false
                exclude "**/prebuilds/**"

                eachFile { fileCopyDetails ->
                    def relativePathStr = fileCopyDetails.relativePath.toString()
                    def targetFile = new File(targetDirPath, relativePathStr)
                    if (targetFile.exists()) {
                        taskLogger.info("Replacing ${relativePathStr} with Android-built version for ${abiName}")
                    }
                }

                onlyIf {
                    if (!sourceDir.exists()) {
                        return false
                    }
                    // Only copy when splits are not enabled
                    if (!currentSplitsEnabled) {
                        // No splits: copy only primary ABI to main assets
                        return abiName == 'arm64-v8a'
                    }
                    return false
                }

                // Clean up prebuilds directories after copying Android-built files
                // This removes unused prebuilt binaries for other platforms (macOS, Linux, Windows)
                doLast {
                    def targetDirFile = new File(targetDirPath)
                    if (targetDirFile.exists()) {
                        def prebuildsDirs = []
                        // Use Java File API for configuration cache compatibility
                        // Define closure with forward reference using Closure type
                        Closure findPrebuilds
                        findPrebuilds = { File dir ->
                            dir.eachFile { file ->
                                if (file.isDirectory()) {
                                    if (file.name == 'prebuilds') {
                                        prebuildsDirs.add(file)
                                    } else {
                                        findPrebuilds.call(file)
                                    }
                                }
                            }
                        }
                        findPrebuilds.call(targetDirFile)
                        prebuildsDirs.each { dir ->
                            if (dir.exists()) {
                                dir.deleteDir()
                                taskLogger.info("Removed prebuilds directory: ${dir.absolutePath}")
                            }
                        }
                    }
                }
            }

            // Bundle mode: Flatten node_modules structure by moving .node files up to nodejs/ and removing node_modules
            // This runs after native modules are copied and only when bundle mode is enabled
            // Example: nodejs/node_modules/bettersqlite3/build/Release/better_sqlite3.node -> nodejs/build/Release/better_sqlite3.node
            if (finalBundleMode) {
                // Task for split APKs (main assets)
                if (currentSplitsEnabled && !currentUniversalApkEnabled) {
                    tasks.register("BundleNodeModulesForSplit${abiName}") {
                        dependsOn "CopyAndroidNodeFilesToSplitAssets${abiName}"
                        description = "Flatten node_modules structure for ${abiName} (bundle mode, split APKs)"

                        def nodeModulesPath = "${rootProject.projectDir}/app/src/main/assets/public/${nodeDir}/node_modules"
                        def nodeModulesDir = file(nodeModulesPath)
                        def nodejsBasePath = "${rootProject.projectDir}/app/src/main/assets/public/${nodeDir}"
                        def nodejsBaseDir = file(nodejsBasePath)
                        def taskLogger = logger

                        doLast {
                            if (!nodeModulesDir.exists()) {
                                taskLogger.info("BundleNodeModulesForSplit${abiName}: Directory ${nodeModulesPath} does not exist, skipping")
                                return
                            }

                            int movedCount = 0
                            def nodeFiles = []

                            // First pass: collect all .node files and their target paths
                            java.nio.file.Files.walkFileTree(nodeModulesDir.toPath(), new java.nio.file.FileVisitor<java.nio.file.Path>() {
                                java.nio.file.FileVisitResult preVisitDirectory(java.nio.file.Path dir, java.nio.file.attribute.BasicFileAttributes attrs) {
                                    return java.nio.file.FileVisitResult.CONTINUE
                                }

                                java.nio.file.FileVisitResult visitFile(java.nio.file.Path file, java.nio.file.attribute.BasicFileAttributes attrs) {
                                    def fileName = file.fileName.toString()
                                    if (fileName.endsWith('.node')) {
                                        // Get path relative to node_modules
                                        def relativePath = nodeModulesDir.toPath().relativize(file)

                                        // Skip the package name (first part) and use the rest
                                        def nameCount = relativePath.nameCount
                                        if (nameCount > 1) {
                                            // Get subpath starting from index 1 (skip package name)
                                            def subPath = relativePath.subpath(1, nameCount)
                                            def flattenedPath = java.nio.file.Paths.get(nodejsBasePath).resolve(subPath)
                                            nodeFiles.add([source: file, target: flattenedPath])
                                        }
                                    }
                                    return java.nio.file.FileVisitResult.CONTINUE
                                }

                                java.nio.file.FileVisitResult visitFileFailed(java.nio.file.Path file, java.io.IOException exc) {
                                    return java.nio.file.FileVisitResult.CONTINUE
                                }

                                java.nio.file.FileVisitResult postVisitDirectory(java.nio.file.Path dir, java.io.IOException exc) {
                                    return java.nio.file.FileVisitResult.CONTINUE
                                }
                            })

                            // Second pass: move files to flattened locations
                            nodeFiles.each { fileInfo ->
                                try {
                                    def targetPath = fileInfo.target
                                    def targetParent = targetPath.parent
                                    if (targetParent != null && !java.nio.file.Files.exists(targetParent)) {
                                        java.nio.file.Files.createDirectories(targetParent)
                                    }
                                    java.nio.file.Files.copy(fileInfo.source, targetPath, java.nio.file.StandardCopyOption.REPLACE_EXISTING)
                                    movedCount++
                                } catch (Exception e) {
                                    taskLogger.warn("BundleNodeModulesForSplit${abiName}: Failed to move ${fileInfo.source} to ${fileInfo.target}: ${e.message}")
                                }
                            }

                            // Third pass: delete non-essential files from node_modules, but preserve package.json files
                            // Native modules need their package.json to resolve binary paths at runtime
                            if (nodeModulesDir.exists()) {
                                try {
                                    int deletedCount = 0
                                    java.nio.file.Files.walkFileTree(nodeModulesDir.toPath(), new java.nio.file.FileVisitor<java.nio.file.Path>() {
                                        java.nio.file.FileVisitResult preVisitDirectory(java.nio.file.Path dir, java.nio.file.attribute.BasicFileAttributes attrs) {
                                            return java.nio.file.FileVisitResult.CONTINUE
                                        }

                                        java.nio.file.FileVisitResult visitFile(java.nio.file.Path file, java.nio.file.attribute.BasicFileAttributes attrs) {
                                            def fileName = file.fileName.toString()
                                            // Keep .node files (already moved), package.json files (needed for path resolution), and dir.list/file.list
                                            if (!fileName.endsWith('.node') &&
                                                !fileName.equals('package.json') &&
                                                !fileName.equals('dir.list') &&
                                                !fileName.equals('file.list')) {
                                                try {
                                                    java.nio.file.Files.delete(file)
                                                    deletedCount++
                                                } catch (Exception e) {
                                                    taskLogger.warn("BundleNodeModulesForSplit${abiName}: Failed to delete ${file}: ${e.message}")
                                                }
                                            }
                                            return java.nio.file.FileVisitResult.CONTINUE
                                        }

                                        java.nio.file.FileVisitResult visitFileFailed(java.nio.file.Path file, java.io.IOException exc) {
                                            return java.nio.file.FileVisitResult.CONTINUE
                                        }

                                        java.nio.file.FileVisitResult postVisitDirectory(java.nio.file.Path dir, java.io.IOException exc) {
                                            // Delete empty directories (except node_modules itself and directories containing package.json)
                                            try {
                                                if (dir != nodeModulesDir.toPath()) {
                                                    def dirFile = dir.toFile()
                                                    def files = dirFile.listFiles()
                                                    if (files == null || files.length == 0) {
                                                        java.nio.file.Files.delete(dir)
                                                    }
                                                }
                                            } catch (Exception e) {
                                                // Directory not empty or other error, skip
                                            }
                                            return java.nio.file.FileVisitResult.CONTINUE
                                        }
                                    })
                                    taskLogger.info("BundleNodeModulesForSplit${abiName}: Deleted ${deletedCount} non-essential files from node_modules (preserved package.json files)")
                                } catch (Exception e) {
                                    taskLogger.warn("BundleNodeModulesForSplit${abiName}: Failed to clean node_modules directory: ${e.message}")
                                }
                            }

                            taskLogger.info("BundleNodeModulesForSplit${abiName}: Moved ${movedCount} .node files to flattened structure")
                        }

                        onlyIf {
                            finalBundleMode && nodeModulesDir.exists()
                        }
                    }
                }

                // Task for universal APK (architecture-specific assets)
                if (currentSplitsEnabled && currentUniversalApkEnabled) {
                    tasks.register("BundleNodeModulesForUniversal${abiName}") {
                        dependsOn "CopyAndroidNodeFilesToUniversalAssets${abiName}"
                        description = "Flatten node_modules structure for ${abiName} (bundle mode, universal APK)"

                        def nodeModulesPath = "${rootProject.projectDir}/app/src/main/assets-${abiName}/public/${nodeDir}/node_modules"
                        def nodeModulesDir = file(nodeModulesPath)
                        def nodejsBasePath = "${rootProject.projectDir}/app/src/main/assets-${abiName}/public/${nodeDir}"
                        def nodejsBaseDir = file(nodejsBasePath)
                        def taskLogger = logger

                        doLast {
                            if (!nodeModulesDir.exists()) {
                                taskLogger.info("BundleNodeModulesForUniversal${abiName}: Directory ${nodeModulesPath} does not exist, skipping")
                                return
                            }

                            int movedCount = 0
                            def nodeFiles = []

                            // First pass: collect all .node files and their target paths
                            java.nio.file.Files.walkFileTree(nodeModulesDir.toPath(), new java.nio.file.FileVisitor<java.nio.file.Path>() {
                                java.nio.file.FileVisitResult preVisitDirectory(java.nio.file.Path dir, java.nio.file.attribute.BasicFileAttributes attrs) {
                                    return java.nio.file.FileVisitResult.CONTINUE
                                }

                                java.nio.file.FileVisitResult visitFile(java.nio.file.Path file, java.nio.file.attribute.BasicFileAttributes attrs) {
                                    def fileName = file.fileName.toString()
                                    if (fileName.endsWith('.node')) {
                                        // Get path relative to node_modules
                                        def relativePath = nodeModulesDir.toPath().relativize(file)

                                        // Skip the package name (first part) and use the rest
                                        def nameCount = relativePath.nameCount
                                        if (nameCount > 1) {
                                            // Get subpath starting from index 1 (skip package name)
                                            def subPath = relativePath.subpath(1, nameCount)
                                            def flattenedPath = java.nio.file.Paths.get(nodejsBasePath).resolve(subPath)
                                            nodeFiles.add([source: file, target: flattenedPath])
                                        }
                                    }
                                    return java.nio.file.FileVisitResult.CONTINUE
                                }

                                java.nio.file.FileVisitResult visitFileFailed(java.nio.file.Path file, java.io.IOException exc) {
                                    return java.nio.file.FileVisitResult.CONTINUE
                                }

                                java.nio.file.FileVisitResult postVisitDirectory(java.nio.file.Path dir, java.io.IOException exc) {
                                    return java.nio.file.FileVisitResult.CONTINUE
                                }
                            })

                            // Second pass: move files to flattened locations
                            nodeFiles.each { fileInfo ->
                                try {
                                    def targetPath = fileInfo.target
                                    def targetParent = targetPath.parent
                                    if (targetParent != null && !java.nio.file.Files.exists(targetParent)) {
                                        java.nio.file.Files.createDirectories(targetParent)
                                    }
                                    java.nio.file.Files.copy(fileInfo.source, targetPath, java.nio.file.StandardCopyOption.REPLACE_EXISTING)
                                    movedCount++
                                } catch (Exception e) {
                                    taskLogger.warn("BundleNodeModulesForUniversal${abiName}: Failed to move ${fileInfo.source} to ${fileInfo.target}: ${e.message}")
                                }
                            }

                            // Third pass: delete the entire node_modules directory
                            if (nodeModulesDir.exists()) {
                                try {
                                    nodeModulesDir.deleteDir()
                                    taskLogger.info("BundleNodeModulesForUniversal${abiName}: Deleted node_modules directory")
                                } catch (Exception e) {
                                    taskLogger.warn("BundleNodeModulesForUniversal${abiName}: Failed to delete node_modules directory: ${e.message}")
                                }
                            }

                            taskLogger.info("BundleNodeModulesForUniversal${abiName}: Moved ${movedCount} .node files to flattened structure")
                        }

                        onlyIf {
                            finalBundleMode && nodeModulesDir.exists()
                        }
                    }
                }

                // Task for no splits (main assets)
                tasks.register("BundleNodeModulesForMain${abiName}") {
                    def mainAssetsTask = project.tasks.findByName("CopyAndroidNodeFilesToAppAssets${abiName}")
                    if (mainAssetsTask != null) {
                        dependsOn mainAssetsTask
                    }
                    description = "Flatten node_modules structure for ${abiName} (bundle mode, no splits)"

                    def nodeModulesPath = "${rootProject.projectDir}/app/src/main/assets/public/${nodeDir}/node_modules"
                    def nodeModulesDir = file(nodeModulesPath)
                    def nodejsBasePath = "${rootProject.projectDir}/app/src/main/assets/public/${nodeDir}"
                    def nodejsBaseDir = file(nodejsBasePath)
                    def taskLogger = logger

                    doLast {
                        if (!nodeModulesDir.exists()) {
                            taskLogger.info("BundleNodeModulesForMain${abiName}: Directory ${nodeModulesPath} does not exist, skipping")
                            return
                        }

                        int movedCount = 0
                        def nodeFiles = []

                        // First pass: collect all .node files and their target paths
                        java.nio.file.Files.walkFileTree(nodeModulesDir.toPath(), new java.nio.file.FileVisitor<java.nio.file.Path>() {
                            java.nio.file.FileVisitResult preVisitDirectory(java.nio.file.Path dir, java.nio.file.attribute.BasicFileAttributes attrs) {
                                return java.nio.file.FileVisitResult.CONTINUE
                            }

                            java.nio.file.FileVisitResult visitFile(java.nio.file.Path file, java.nio.file.attribute.BasicFileAttributes attrs) {
                                def fileName = file.fileName.toString()
                                if (fileName.endsWith('.node')) {
                                    // Get path relative to node_modules
                                    def relativePath = nodeModulesDir.toPath().relativize(file)
                                    def pathParts = relativePath.toString().split(java.io.File.separator)

                                    // Skip the package name (first part) and use the rest
                                    if (pathParts.length > 1) {
                                        def flattenedPath = java.nio.file.Paths.get(nodejsBasePath, pathParts[1..-1].join(java.io.File.separator))
                                        nodeFiles.add([source: file, target: flattenedPath])
                                    }
                                }
                                return java.nio.file.FileVisitResult.CONTINUE
                            }

                            java.nio.file.FileVisitResult visitFileFailed(java.nio.file.Path file, java.io.IOException exc) {
                                return java.nio.file.FileVisitResult.CONTINUE
                            }

                            java.nio.file.FileVisitResult postVisitDirectory(java.nio.file.Path dir, java.io.IOException exc) {
                                return java.nio.file.FileVisitResult.CONTINUE
                            }
                        })

                        // Second pass: move files to flattened locations
                        nodeFiles.each { fileInfo ->
                            try {
                                def targetPath = fileInfo.target
                                def targetParent = targetPath.parent
                                if (targetParent != null && !java.nio.file.Files.exists(targetParent)) {
                                    java.nio.file.Files.createDirectories(targetParent)
                                }
                                java.nio.file.Files.copy(fileInfo.source, targetPath, java.nio.file.StandardCopyOption.REPLACE_EXISTING)
                                movedCount++
                            } catch (Exception e) {
                                taskLogger.warn("BundleNodeModulesForMain${abiName}: Failed to move ${fileInfo.source} to ${fileInfo.target}: ${e.message}")
                            }
                        }

                        // Third pass: delete the entire node_modules directory
                        if (nodeModulesDir.exists()) {
                            try {
                                nodeModulesDir.deleteDir()
                                taskLogger.info("BundleNodeModulesForMain${abiName}: Deleted node_modules directory")
                            } catch (Exception e) {
                                taskLogger.warn("BundleNodeModulesForMain${abiName}: Failed to delete node_modules directory: ${e.message}")
                            }
                        }

                        taskLogger.info("BundleNodeModulesForMain${abiName}: Moved ${movedCount} .node files to flattened structure")
                    }

                    onlyIf {
                        if (!finalBundleMode) {
                            return false
                        }
                        if (!currentSplitsEnabled) {
                            // Only run for primary ABI when no splits
                            return abiName == 'arm64-v8a'
                        }
                        return false
                    }
                }
            }

            // Set up task dependencies after all tasks are registered
            // Make tasks for different ABIs run sequentially to avoid conflicts when writing to the same directory
            gradle.projectsEvaluated {
                // Handle dependencies for main assets task (universal APK or no splits)
                def mainAssetsTask = project.tasks.findByName("CopyAndroidNodeFilesToAppAssets${abiName}")
                if (mainAssetsTask != null) {
                    // Determine order based on ABI name
                    def abiOrder = ['arm64-v8a': 1, 'x86_64': 2, 'armeabi-v7a': 3, 'x86': 4]
                    def thisOrder = abiOrder[abiName] ?: 99

                    // Make this task depend on all previous ABI tasks
                    def abisForOrder = currentSplitsEnabled ? pluginAbiFilters : (android.defaultConfig.ndk.abiFilters ?: pluginAbiFilters)
                    abisForOrder.each { otherAbi ->
                        if (otherAbi != abiName) {
                            def otherOrder = abiOrder[otherAbi] ?: 99
                            if (otherOrder < thisOrder) {
                                def otherTask = project.tasks.findByName("CopyAndroidNodeFilesToAppAssets${otherAbi}")
                                if (otherTask != null) {
                                    mainAssetsTask.dependsOn otherTask
                                }
                            }
                        }
                    }
                }

                // Handle dependencies for split assets task (when splits are enabled)
                if (currentSplitsEnabled) {
                    def splitAssetsTask = project.tasks.findByName("CopyAndroidNodeFilesToSplitAssets${abiName}")
                    if (splitAssetsTask != null) {
                        // Split assets tasks can run in parallel (they write to different directories)
                        // But we still want them to depend on CopyNodeProjectAssets to avoid conflicts
                        // This is already handled in the task definition above
                    }
                }
            }

            // Task 3: Remove wrong-architecture .node files from architecture-specific assets for split APKs
            // This ensures each split APK only contains .node files for its own architecture
            if (currentSplitsEnabled && !currentUniversalApkEnabled) {
                // For each ABI, remove .node files from other ABIs' architecture-specific assets
                pluginAbiFilters.each { otherAbi ->
                    if (otherAbi != abiName) {
                        tasks.register("RemoveNodeFilesFromSplitAssets${abiName}For${otherAbi}", Delete) {
                            description = "Remove .node files for ${otherAbi} from ${abiName} split assets (split APKs only)"

                            def targetDirPath = "${rootProject.projectDir}/app/src/main/assets-${abiName}/public/${nodeDir}/node_modules"

                            // Delete all .node files recursively (these are for the wrong architecture)
                            delete fileTree(dir: targetDirPath) {
                                include "**/*.node"
                            }

                            doLast {
                                logger.info("capacitor-nodejs: Removed .node files from ${targetDirPath} (removing ${otherAbi} files from ${abiName} split)")
                            }

                            onlyIf {
                                def targetDir = file(targetDirPath)
                                if (!targetDir.exists()) {
                                    return false
                                }
                                // Check if there are any .node files to delete
                                def nodeFiles = fileTree(dir: targetDirPath) {
                                    include "**/*.node"
                                }
                                return !nodeFiles.isEmpty()
                            }
                        }
                    }
                }

                // Also remove .node files from main assets when splits are enabled and universalApk is false
                // This prevents wrong-architecture files from being loaded at runtime
                // Note: This task is registered once (for the first ABI) and removes all .node files from assets/public/
                if (abiName == pluginAbiFilters.first()) {
                    tasks.register("RemoveNodeFilesFromMainAssets", Delete) {
                        description = "Remove .node files from main assets (split APKs only, not universal)"

                        def targetDirPath = "${rootProject.projectDir}/app/src/main/assets/public/${nodeDir}/node_modules"
                        def targetDir = file(targetDirPath)

                        // Delete all .node files recursively
                        delete fileTree(dir: targetDir) {
                            include "**/*.node"
                        }

                        doFirst {
                            logger.info("capacitor-nodejs: RemoveNodeFilesFromMainAssets: Checking ${targetDirPath}")
                            if (targetDir.exists()) {
                                def nodeFiles = fileTree(dir: targetDir) {
                                    include "**/*.node"
                                }
                                logger.info("capacitor-nodejs: RemoveNodeFilesFromMainAssets: Found ${nodeFiles.files.size()} .node files to remove")
                            } else {
                                logger.info("capacitor-nodejs: RemoveNodeFilesFromMainAssets: Directory ${targetDirPath} does not exist")
                            }
                        }

                        doLast {
                            logger.info("capacitor-nodejs: Removed .node files from ${targetDirPath} (split APKs only)")
                        }

                        onlyIf {
                            if (!targetDir.exists()) {
                                return false
                            }
                            // Check if there are any .node files to delete
                            def nodeFiles = fileTree(dir: targetDir) {
                                include "**/*.node"
                            }
                            def hasNodeFiles = !nodeFiles.isEmpty()
                            if (hasNodeFiles) {
                                logger.info("capacitor-nodejs: RemoveNodeFilesFromMainAssets: Will remove ${nodeFiles.files.size()} .node files from ${targetDirPath}")
                            }
                            return hasNodeFiles
                        }
                    }

                    // Also remove .node files from main assets for universal APK
                    // Universal APK should only have .node files in architecture-specific assets
                    if (currentSplitsEnabled && currentUniversalApkEnabled) {
                        tasks.register("RemoveNodeFilesFromMainAssetsForUniversal", Delete) {
                            description = "Remove .node files from main assets (universal APK - files should be in architecture-specific assets)"

                            def targetDirPath = "${rootProject.projectDir}/app/src/main/assets/public/${nodeDir}/node_modules"
                            def targetDir = new File(targetDirPath)

                            // Delete all .node files recursively
                            delete fileTree(dir: targetDirPath) {
                                include "**/*.node"
                            }

                            doFirst {
                                logger.info("capacitor-nodejs: RemoveNodeFilesFromMainAssetsForUniversal: Checking ${targetDirPath}")
                                if (targetDir.exists()) {
                                    def nodeFiles = fileTree(dir: targetDirPath) {
                                        include "**/*.node"
                                    }
                                    logger.info("capacitor-nodejs: RemoveNodeFilesFromMainAssetsForUniversal: Found ${nodeFiles.files.size()} .node files to remove")
                                } else {
                                    logger.info("capacitor-nodejs: RemoveNodeFilesFromMainAssetsForUniversal: Directory ${targetDirPath} does not exist")
                                }
                            }

                            doLast {
                                logger.info("capacitor-nodejs: Removed .node files from ${targetDirPath} (universal APK - files should be in architecture-specific assets)")
                            }

                            onlyIf {
                                if (!targetDir.exists()) {
                                    return false
                                }
                                // Check if there are any .node files to delete
                                def nodeFiles = fileTree(dir: targetDirPath) {
                                    include "**/*.node"
                                }
                                def hasNodeFiles = !nodeFiles.isEmpty()
                                if (hasNodeFiles) {
                                    logger.info("capacitor-nodejs: RemoveNodeFilesFromMainAssetsForUniversal: Will remove ${nodeFiles.files.size()} .node files from ${targetDirPath}")
                                }
                                return hasNodeFiles
                            }
                        }
                    }
                }
            }

            // Make the app's mergeAssets tasks depend on copying Android .node files
            // This ensures Android-built files replace non-Android versions (macOS, Linux, Windows) before assets are merged
            // Works on both macOS and Linux build systems
            gradle.projectsEvaluated {
                def appProject = rootProject.findProject(':app')
                if (appProject != null) {
                    // Hook up main assets task (only for no splits - not for split or universal APK)
                    if (!currentSplitsEnabled) {
                        def mainAssetsTask = project.tasks.findByName("CopyAndroidNodeFilesToAppAssets${abiName}")
                        if (mainAssetsTask != null) {
                            appProject.android.applicationVariants.all { variant ->
                                def mergeAssetsTask = appProject.tasks.findByName("merge${variant.name.capitalize()}Assets")
                                if (mergeAssetsTask != null) {
                                    mergeAssetsTask.dependsOn mainAssetsTask
                                    logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets will depend on CopyAndroidNodeFilesToAppAssets${abiName} (no splits)")

                                    // Hook up bundle task if bundle mode is enabled
                                    if (finalBundleMode) {
                                        def bundleTask = project.tasks.findByName("BundleNodeModulesForMain${abiName}")
                                        if (bundleTask != null) {
                                            mergeAssetsTask.dependsOn bundleTask
                                            logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets will depend on BundleNodeModulesForMain${abiName} (bundle mode)")
                                        }
                                    }
                                }
                            }
                        }
                    }

                    // Hook up remove task for split APKs (when universalApk is false)
                    // This removes .node files from main assets so only architecture-specific assets are used
                    if (currentSplitsEnabled && !currentUniversalApkEnabled) {
                        def removeMainTask = project.tasks.findByName("RemoveNodeFilesFromMainAssets")
                        if (removeMainTask != null) {
                            appProject.android.applicationVariants.all { variant ->
                                def mergeAssetsTask = appProject.tasks.findByName("merge${variant.name.capitalize()}Assets")
                                if (mergeAssetsTask != null) {
                                    // Run remove task before mergeAssets to ensure wrong-architecture files are deleted
                                    mergeAssetsTask.dependsOn removeMainTask
                                    logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets will depend on RemoveNodeFilesFromMainAssets")
                                }
                            }
                        }
                    }

                    // Hook up split assets task (for split APKs when splits enabled and universalApk is false)
                    // Split APKs: each APK only contains one architecture, so .node files go to main assets
                    if (currentSplitsEnabled && !currentUniversalApkEnabled) {
                        def splitAssetsTask = project.tasks.findByName("CopyAndroidNodeFilesToSplitAssets${abiName}")
                        if (splitAssetsTask != null) {
                            appProject.android.applicationVariants.all { variant ->
                                // For split APKs, we need to hook into architecture-specific merge tasks
                                // Android creates tasks like mergeDebugAssetsArm64-v8a, mergeDebugAssetsX86_64, etc.
                                def abiSanitized = abiName.replaceAll('-', '').replaceAll('_', '')
                                def mergeSplitAssetsTask = appProject.tasks.findByName("merge${variant.name.capitalize()}Assets${abiSanitized.capitalize()}")
                                if (mergeSplitAssetsTask != null) {
                                    mergeSplitAssetsTask.dependsOn splitAssetsTask
                                    logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets${abiSanitized.capitalize()} will depend on CopyAndroidNodeFilesToSplitAssets${abiName}")

                                    // Hook up bundle task if bundle mode is enabled
                                    if (finalBundleMode) {
                                        def bundleTask = project.tasks.findByName("BundleNodeModulesForSplit${abiName}")
                                        if (bundleTask != null) {
                                            mergeSplitAssetsTask.dependsOn bundleTask
                                            logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets${abiSanitized.capitalize()} will depend on BundleNodeModulesForSplit${abiName} (bundle mode)")
                                        }
                                    }
                                } else {
                                    // Fallback: also hook into main mergeAssets task
                                    def mergeAssetsTask = appProject.tasks.findByName("merge${variant.name.capitalize()}Assets")
                                    if (mergeAssetsTask != null) {
                                        mergeAssetsTask.dependsOn splitAssetsTask
                                        logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets will also depend on CopyAndroidNodeFilesToSplitAssets${abiName}")

                                        // Hook up bundle task if bundle mode is enabled
                                        if (finalBundleMode) {
                                            def bundleTask = project.tasks.findByName("BundleNodeModulesForSplit${abiName}")
                                            if (bundleTask != null) {
                                                mergeAssetsTask.dependsOn bundleTask
                                                logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets will depend on BundleNodeModulesForSplit${abiName} (bundle mode)")
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }

                    // Hook up universal APK task (when splits enabled and universalApk is true)
                    // Universal APK: contains all architectures, so .node files go to architecture-specific assets
                    if (currentSplitsEnabled && currentUniversalApkEnabled) {
                        // First, ensure .node files are removed from main assets for universal APK
                        def removeMainTaskForUniversal = project.tasks.findByName("RemoveNodeFilesFromMainAssetsForUniversal")
                        if (removeMainTaskForUniversal != null) {
                            appProject.android.applicationVariants.all { variant ->
                                def mergeAssetsTask = appProject.tasks.findByName("merge${variant.name.capitalize()}Assets")
                                if (mergeAssetsTask != null) {
                                    mergeAssetsTask.dependsOn removeMainTaskForUniversal
                                    logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets will depend on RemoveNodeFilesFromMainAssetsForUniversal (universal APK)")
                                }
                            }
                        }

                        def universalAssetsTask = project.tasks.findByName("CopyAndroidNodeFilesToUniversalAssets${abiName}")
                        if (universalAssetsTask != null) {
                            // Make universal task depend on remove task
                            if (removeMainTaskForUniversal != null) {
                                universalAssetsTask.dependsOn removeMainTaskForUniversal
                            }

                            appProject.android.applicationVariants.all { variant ->
                                // For universal APK, hook into architecture-specific merge tasks
                                def abiSanitized = abiName.replaceAll('-', '').replaceAll('_', '')
                                def mergeSplitAssetsTask = appProject.tasks.findByName("merge${variant.name.capitalize()}Assets${abiSanitized.capitalize()}")
                                if (mergeSplitAssetsTask != null) {
                                    mergeSplitAssetsTask.dependsOn universalAssetsTask
                                    logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets${abiSanitized.capitalize()} will depend on CopyAndroidNodeFilesToUniversalAssets${abiName}")

                                    // Hook up bundle task if bundle mode is enabled
                                    if (finalBundleMode) {
                                        def bundleTask = project.tasks.findByName("BundleNodeModulesForUniversal${abiName}")
                                        if (bundleTask != null) {
                                            mergeSplitAssetsTask.dependsOn bundleTask
                                            logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets${abiSanitized.capitalize()} will depend on BundleNodeModulesForUniversal${abiName} (bundle mode)")
                                        }
                                    }

                                    // Also copy to main assets for split APKs
                                    def abiSanitizedForTask = abiName.replaceAll('-', '').replaceAll('_', '')
                                    def copyToMainTask = project.tasks.findByName("CopyAndroidNodeFilesToMainAssetsForSplit${abiSanitizedForTask}")
                                    if (copyToMainTask != null) {
                                        mergeSplitAssetsTask.dependsOn copyToMainTask
                                        logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets${abiSanitized.capitalize()} will depend on CopyAndroidNodeFilesToMainAssetsForSplit${abiSanitizedForTask} (split APK)")
                                    }
                                }
                                // Also hook into main mergeAssets task to ensure universal APK includes all architectures
                                def mergeAssetsTask = appProject.tasks.findByName("merge${variant.name.capitalize()}Assets")
                                if (mergeAssetsTask != null) {
                                    mergeAssetsTask.dependsOn universalAssetsTask
                                    logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets will also depend on CopyAndroidNodeFilesToUniversalAssets${abiName} (universal APK)")

                                    // Hook up bundle task if bundle mode is enabled
                                    if (finalBundleMode) {
                                        def bundleTask = project.tasks.findByName("BundleNodeModulesForUniversal${abiName}")
                                        if (bundleTask != null) {
                                            mergeAssetsTask.dependsOn bundleTask
                                            logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets will depend on BundleNodeModulesForUniversal${abiName} (bundle mode)")
                                        }
                                        // Also clean main assets node_modules when universalApk is enabled
                                        def bundleMainAssetsTask = project.tasks.findByName("BundleNodeModulesFromMainAssets")
                                        if (bundleMainAssetsTask != null) {
                                            mergeAssetsTask.dependsOn bundleMainAssetsTask
                                            logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets will depend on BundleNodeModulesFromMainAssets (bundle mode, universal APK)")
                                        }
                                    }

                                    // Also copy to main assets for split APKs (each split APK needs its architecture's .node files)
                                    // This must run AFTER bundle tasks to ensure .node files aren't deleted
                                    def abiSanitizedForTask = abiName.replaceAll('-', '').replaceAll('_', '')
                                    def copyToMainTask = project.tasks.findByName("CopyAndroidNodeFilesToMainAssetsForSplit${abiSanitizedForTask}")
                                    if (copyToMainTask != null) {
                                        mergeAssetsTask.dependsOn copyToMainTask
                                        logger.info("capacitor-nodejs: merge${variant.name.capitalize()}Assets will depend on CopyAndroidNodeFilesToMainAssetsForSplit${abiSanitizedForTask} (split APK)")
                                        // Make copy task depend on bundle tasks to ensure it runs after
                                        if (finalBundleMode) {
                                            def bundleTask = project.tasks.findByName("BundleNodeModulesForUniversal${abiName}")
                                            if (bundleTask != null) {
                                                copyToMainTask.dependsOn bundleTask
                                            }
                                            def bundleMainAssetsTask = project.tasks.findByName("BundleNodeModulesFromMainAssets")
                                            if (bundleMainAssetsTask != null) {
                                                copyToMainTask.dependsOn bundleMainAssetsTask
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }

            // Copy file.list and dir.list to final assets location instead of including entire build directory
            // This prevents build artifacts (nodejs-native-assets-*) from being included in the APK
            // Note: This code is inside the abisToBuild.each loop, so we use the outer loop's abiName variable
            // Copy list files to main assets for split APKs (each APK only contains one architecture)
            if (currentSplitsEnabled && !currentUniversalApkEnabled) {
                tasks.register("CopyNodeAssetsListsToSplit${abiName}", Copy) {
                    dependsOn "GenerateNodeNativeAssetsLists${abiName}"
                    description = "Copy file.list and dir.list for ${abiName} to main assets (split APKs)"

                    def sourceDir = file("${rootBuildDir}/nodejs-native-assets/nodejs-native-assets-${abiName}/")
                    def targetDirPath = "${rootProject.projectDir}/app/src/main/assets/public/${nodeDir}/"
                    def targetDir = file(targetDirPath)

                    from sourceDir
                    into targetDir
                    include "file.list"
                    include "dir.list"

                    onlyIf {
                        new File(sourceDir, "file.list").exists() || new File(sourceDir, "dir.list").exists()
                    }
                }

                // Make the split assets copy task depend on copying the list files
                def splitAssetsTask = project.tasks.findByName("CopyAndroidNodeFilesToSplitAssets${abiName}")
                if (splitAssetsTask != null) {
                    splitAssetsTask.dependsOn "CopyNodeAssetsListsToSplit${abiName}"
                }
            }

            // Copy list files to architecture-specific assets for universal APK (contains all architectures)
            if (currentSplitsEnabled && currentUniversalApkEnabled) {
                tasks.register("CopyNodeAssetsListsToUniversal${abiName}", Copy) {
                    dependsOn "GenerateNodeNativeAssetsLists${abiName}"
                    description = "Copy file.list and dir.list for ${abiName} to architecture-specific assets (universal APK)"

                    def sourceDir = file("${rootBuildDir}/nodejs-native-assets/nodejs-native-assets-${abiName}/")
                    def targetDirPath = "${rootProject.projectDir}/app/src/main/assets-${abiName}/public/${nodeDir}/"
                    def targetDir = file(targetDirPath)

                    from sourceDir
                    into targetDir
                    include "file.list"
                    include "dir.list"

                    onlyIf {
                        new File(sourceDir, "file.list").exists() || new File(sourceDir, "dir.list").exists()
                    }
                }

                // Make the universal assets copy task depend on copying the list files
                def universalAssetsTask = project.tasks.findByName("CopyAndroidNodeFilesToUniversalAssets${abiName}")
                if (universalAssetsTask != null) {
                    universalAssetsTask.dependsOn "CopyNodeAssetsListsToUniversal${abiName}"
                }
            }

            // Copy list files to main assets (for no splits)
            tasks.register("CopyNodeAssetsListsToMain${abiName}", Copy) {
                dependsOn "GenerateNodeNativeAssetsLists${abiName}"
                description = "Copy file.list and dir.list for ${abiName} to main assets (no splits)"

                def sourceDir = file("${rootBuildDir}/nodejs-native-assets/nodejs-native-assets-${abiName}/")
                def targetDirPath = "${rootProject.projectDir}/app/src/main/assets/public/${nodeDir}/"
                def targetDir = file(targetDirPath)

                from sourceDir
                into targetDir
                include "file.list"
                include "dir.list"

                onlyIf {
                    if (!currentSplitsEnabled) {
                        return new File(sourceDir, "file.list").exists() || new File(sourceDir, "dir.list").exists()
                    }
                    return false
                }
            }

            // Make the main assets copy task depend on copying the list files
            def mainAssetsTask = project.tasks.findByName("CopyAndroidNodeFilesToAppAssets${abiName}")
            if (mainAssetsTask != null) {
                mainAssetsTask.dependsOn "CopyNodeAssetsListsToMain${abiName}"
            }

            // Don't add the build directory to assets - it contains build artifacts that shouldn't be in the APK
            // The .node files and list files are copied to the final assets location by the copy tasks above
        }
    }
}.call()
