name: Test iOS Build

on:
  workflow_dispatch:

jobs:
  test-ios:
    name: Test iOS Build
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: |
          yarn install
          yarn build

      - name: Pack plugin
        run: |
          yarn pack
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          ARCHIVE_NAME="${PACKAGE_NAME}-${PACKAGE_VERSION}.tgz"
          # Find the packed file (yarn pack creates it in the current directory)
          PACKED_FILE=$(ls -1 *.tgz 2>/dev/null | grep -v bridge.tgz | grep "^${PACKAGE_NAME}-" | head -1)
          if [ -z "$PACKED_FILE" ]; then
            echo "Error: Could not find packed file"
            ls -la *.tgz || echo "No .tgz files found"
            exit 1
          fi
          echo "PACKED_FILE=$PACKED_FILE" >> $GITHUB_ENV
          echo "Packed plugin: $PACKED_FILE"

      - name: Setup test project
        run: |
          cd test-project
          # Update package.json to use the packed tarball
          # Get the packed file name from the parent directory (handle both with and without 'v' prefix)
          PACKED_FILE=$(ls -1 ../*.tgz 2>/dev/null | grep -v bridge.tgz | grep "capacitor-nodejs" | head -1 | xargs basename)
          if [ -z "$PACKED_FILE" ]; then
            echo "Error: Could not find packed plugin tarball"
            ls -la ../*.tgz || echo "No .tgz files found in parent directory"
            exit 1
          fi
          PLUGIN_TARBALL="../$PACKED_FILE"
          if [ ! -f "$PLUGIN_TARBALL" ]; then
            echo "Error: Plugin tarball not found at $PLUGIN_TARBALL"
            exit 1
          fi
          echo "Using plugin tarball: $PLUGIN_TARBALL"
          # Use file: protocol with relative path
          npm pkg set "dependencies.capacitor-nodejs=file:$PLUGIN_TARBALL"
          yarn install

      - name: Build web app
        run: |
          cd test-project
          yarn build

      - name: Install Node.js project dependencies
        run: |
          cd test-project/static/nodejs
          # Remove any existing build artifacts
          rm -rf node_modules package-lock.json yarn.lock build
          # Install with --ignore-scripts to prevent building native modules during install
          # They will be rebuilt for iOS during the Xcode build phase
          # Use npm instead of yarn for better --ignore-scripts support
          npm install --ignore-scripts
        env:
          # Additional environment variables to prevent script execution
          npm_config_ignore_scripts: true

      - name: Setup CocoaPods
        run: |
          if ! command -v pod &> /dev/null; then
            sudo gem install cocoapods
          fi
          pod --version

      - name: Add iOS platform
        run: |
          cd test-project
          # Add iOS platform if it doesn't exist
          if [ ! -d "ios" ]; then
            yarn cap add ios
          else
            echo "iOS platform already exists"
          fi

      - name: Sync Capacitor iOS
        run: |
          cd test-project
          # Ensure scripts are built
          cd ..
          yarn build-scripts
          cd test-project
          yarn cap sync ios
        env:
          CAPACITOR_PLATFORM_NAME: ios

      - name: Build iOS app (simulator)
        run: |
          cd test-project/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -derivedDataPath ./build \
            clean build
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

      - name: Build iOS app (device)
        run: |
          cd test-project/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            clean build
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

      - name: Check build artifacts
        run: |
          if [ -d "test-project/ios/App/build" ]; then
            echo "Build artifacts found:"
            find test-project/ios/App/build -name "*.app" -o -name "*.framework" | head -10
          else
            echo "Warning: Build directory not found"
          fi

      - name: Verify native modules were rebuilt
        run: |
          echo "Checking for rebuilt native modules..."
          
          # Check if native modules directory exists in the app bundle
          APP_BUNDLE=$(find test-project/ios/App/build -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "Warning: App bundle not found, skipping native module verification"
            exit 0
          fi
          
          # Check for Node.js directory in the app bundle
          NODEJS_DIR="$APP_BUNDLE/public/nodejs"
          if [ ! -d "$NODEJS_DIR" ]; then
            NODEJS_DIR="$APP_BUNDLE/nodejs"
          fi
          
          if [ -d "$NODEJS_DIR" ]; then
            echo "Found Node.js directory at: $NODEJS_DIR"
            
            # Check for rebuilt native modules
            if [ -d "$NODEJS_DIR/node_modules/better-sqlite3" ]; then
              echo "✓ better-sqlite3 module found"
              if [ -f "$NODEJS_DIR/node_modules/better-sqlite3/build/Release/better_sqlite3.node" ]; then
                echo "✓ better-sqlite3 native module rebuilt successfully"
                ls -lh "$NODEJS_DIR/node_modules/better-sqlite3/build/Release/better_sqlite3.node"
              fi
            fi
            
            if [ -d "$NODEJS_DIR/node_modules/bufferutil" ]; then
              echo "✓ bufferutil module found"
              if find "$NODEJS_DIR/node_modules/bufferutil" -path "*/build/Release/*.node" -o -path "*/build/Debug/*.node" | grep -q .; then
                echo "✓ bufferutil native module rebuilt successfully"
                find "$NODEJS_DIR/node_modules/bufferutil" -path "*/build/Release/*.node" -o -path "*/build/Debug/*.node" | head -1
              else
                echo "⚠ bufferutil may use prebuilds (check if iOS rebuild is needed)"
              fi
            fi
            
            # List all .node files (rebuilt native modules)
            NODE_FILES=$(find "$NODEJS_DIR" -name "*.node" 2>/dev/null | wc -l | tr -d ' ')
            if [ "$NODE_FILES" -gt 0 ]; then
              echo "✓ Found $NODE_FILES native module binary file(s)"
              find "$NODEJS_DIR" -name "*.node" 2>/dev/null | head -5
            else
              echo "⚠ No .node files found (this might be OK if no native modules were installed)"
            fi
            
            # Check for build artifacts
            if [ -d "$NODEJS_DIR/build" ]; then
              echo "✓ Build directory exists"
              ls -la "$NODEJS_DIR/build" || true
            fi
          else
            echo "⚠ Node.js directory not found in app bundle"
            echo "Expected at: $APP_BUNDLE/public/nodejs or $APP_BUNDLE/nodejs"
          fi

